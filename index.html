<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>微光・之上｜蘇九・無限旅程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* 關鍵底色：深焦糖黑、高級炭灰，完美襯托金色 */
  --bg-dark-pure: #0f0c0a;     
  --bg-dark-panel: #14110f;    
  
  /* 完美金屬色彩公式：徹底修正綠調，改為圖片中圈起來的溫潤香檳金 */
  --gold-high-light: #fff3d1;  /* 發光核心：接近白色的極亮金 */
  --gold-classic: #dfba6b;     /* 主色調：絲滑溫潤的香檳金（你圈起來的黃金公式） */
  --gold-shadow: #8a6d33;      /* 陰影面：深沉的古銅金陰影 */
  
  /* 文字與線條細節 */
  --text: #f5f2eb;
  --text-soft: rgba(245,242,235, 0.75);
  --text-faint: rgba(245,242,235, 0.4);
  --line: rgba(223,186,107, 0.18);
}

*{margin:0;padding:0;box-sizing:border-box;}

html, body {
  background: var(--bg-dark-pure);
  color: var(--text);
  font-family: "Noto Serif TC", "Songti TC", "STSong", "Times New Roman", serif;
  overflow-x: hidden;
  line-height: 1.9;
  letter-spacing: .08em;
}

/* 模擬圖片中的微光環境感 */
body::before {
  content: "";
  position: fixed;
  inset: -20%;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 25% 20%, rgba(223,186,107, 0.08), transparent 35%),
    radial-gradient(circle at 75% 75%, rgba(138,109,51, 0.06), transparent 40%),
    linear-gradient(180deg, rgba(15,12,10,0) 50%, rgba(223,186,107,0.03) 100%);
  animation: bgFlow 28s ease-in-out infinite alternate;
}

@keyframes bgFlow{
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(-30px) scale(1.02);}
}

#particles{
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: .65;
  filter: blur(0.5px);
}

.site{ position: relative; z-index: 2; }

.section{
  position: relative;
  width: 100%;
  padding: 80px 22px;
  overflow: hidden;
}

.section::after{
  content: "";
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 86%;
  height: 1px;
  transform: translateX(-50%);
  background: linear-gradient(90deg, transparent, rgba(223,186,107, 0.15), transparent);
}

.stage{
  width: 100%;
  max-width: 520px;
  margin: auto;
  position: relative;
}

.kicker{
  color: var(--gold-classic);
  opacity: .9;
  font-size: 14px;
  letter-spacing: .34em;
  margin-bottom: 18px;
}

/* 標題套用「多重外發光黃金公式」，完美複製圖片質感 */
.title{
  color: var(--gold-classic); 
  font-size: clamp(38px, 12vw, 62px);
  line-height: 1.3;
  font-weight: 300;
  letter-spacing: .13em;
  text-shadow:
    0 0 2px rgba(255, 255, 255, 0.8),
    0 0 8px rgba(223, 186, 107, 0.6),
    0 0 20px rgba(223, 186, 107, 0.25),
    0 0 40px rgba(138, 109, 51, 0.1);
}

.title.big{
  font-size: clamp(58px, 20vw, 110px);
  color: #fff;
  letter-spacing: .18em;
  text-shadow:
    0 0 2px rgba(255, 255, 255, 0.9),
    0 0 12px rgba(255, 255, 255, 0.2),
    0 0 30px rgba(223, 186, 107, 0.1);
}

.copy{
  margin-top: 28px;
  color: var(--text-soft);
  font-size: 17px;
  line-height: 2.1;
  white-space: pre-line;
}

.copy.small{
  font-size: 15px;
  color: var(--text-faint);
  line-height: 2;
}

/* 段落重點字同樣套用完美發光金 */
.gold{
  color: var(--gold-classic);
  text-shadow:
    0 0 2px rgba(255, 255, 255, 0.5),
    0 0 8px rgba(223, 186, 107, 0.4);
}

.brand-ghost{
  margin-top: 40px;
  font-size: 36px;
  line-height: 1.1;
  letter-spacing: .16em;
  color: rgba(223, 186, 107, 0.05);
}

.since{
  margin-top: 46px;
  color: rgba(255, 255, 255, 0.35);
  font-size: 13px;
  letter-spacing: .36em;
}

.photo{
  margin-top: 34px;
  position: relative;
  overflow: hidden;
  background: var(--bg-dark-pure);
  border: 1px solid rgba(223, 186, 107, 0.1);
}

.photo img{
  width: 100%;
  display: block;
  filter: grayscale(1) contrast(1.15) brightness(0.7);
  transform: scale(1.01);
  animation: photoBreath 14s ease-in-out infinite alternate;
}

@keyframes photoBreath{
  from{transform:scale(1.01);}
  to{transform:scale(1.04);}
}

.photo::after{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(15,12,10,0.1), rgba(15,12,10,0.6)),
    radial-gradient(circle at center, transparent 30%, rgba(15,12,10,0.7) 100%);
}

.caption{
  position: absolute;
  left: 18px; right: 18px; bottom: 20px;
  z-index: 2;
  text-align: center;
  color: rgba(245, 242, 235, 0.5);
  font-size: 13px;
  letter-spacing: .16em;
}

.line{
  width: 1px;
  height: 58px;
  margin: 32px auto;
  background: linear-gradient(180deg, transparent, var(--gold-classic), transparent);
  opacity: 0.6;
}

.float-block{
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 1.2s cubic-bezier(0.215, 0.610, 0.355, 1), transform 1.2s cubic-bezier(0.215, 0.610, 0.355, 1);
}

.float-block.show{
  opacity: 1;
  transform: none;
}

.panel-grid{
  width: 100%;
  max-width: 520px;
  margin: auto;
  display: grid;
  gap: 24px;
}

/* 面板卡片：微弱金屬邊框與毛玻璃質感 */
.panel{
  position: relative;
  overflow: hidden;
  padding: 40px 24px;
  border: 1px solid rgba(223, 186, 107, 0.15);
  background: linear-gradient(180deg, rgba(20, 17, 15, 0.7), rgba(15, 12, 10, 0.9));
  backdrop-filter: blur(8px);
  box-shadow:
    inset 0 0 12px rgba(255, 255, 255, 0.01),
    0 10px 30px rgba(0, 0, 0, 0.5);
}

.panel::before{
  content: "";
  position: absolute;
  inset: -45%;
  background: linear-gradient(120deg, transparent 30%, rgba(223,186,107, 0.03) 50%, transparent 70%);
  transform: translateX(-120%) rotate(8deg);
  animation: panelFlow 12s linear infinite;
  pointer-events: none;
}

@keyframes panelFlow{
  from{transform:translateX(-120%) rotate(8deg);}
  to{transform:translateX(120%) rotate(8deg);}
}

/* 卡片內大標題：同步換成完美的香檳金 */
.panel-title{
  position: relative;
  font-size: 26px;
  font-weight: 300;
  letter-spacing: .2em;
  text-align: center;
  color: var(--gold-classic); 
  animation: titleGlow 5s ease-in-out infinite;
}

@keyframes titleGlow{
  0%, 100%{
    opacity: 0.85;
    text-shadow:
      0 0 2px rgba(255, 255, 255, 0.6),
      0 0 8px rgba(223, 186, 107, 0.4);
  }
  50%{
    opacity: 1;
    text-shadow:
      0 0 3px rgba(255, 255, 255, 0.9),
      0 0 14px rgba(223, 186, 107, 0.7),
      0 0 25px rgba(223, 186, 107, 0.2);
  }
}

/* 核心發光點 */
.panel-dot{
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin: 20px auto;
  background: #ffffff;
  box-shadow:
    0 0 4px #ffffff,
    0 0 10px var(--gold-classic),
    0 0 20px var(--gold-shadow);
}

.panel-line{
  width: 60%;
  height: 1px;
  margin: 0 auto 28px;
  background: linear-gradient(90deg, transparent, rgba(223,186,107, 0.25), transparent);
}

.panel-copy{
  color: rgba(245, 242, 235, 0.82);
  font-size: 16px;
  line-height: 2.1;
  text-align: center;
  white-space: pre-line;
}

/* 方案內文的標題色彩（你圖片中圈起來的部分） */
.plan-meta{
  margin-bottom: 20px;
  color: var(--gold-classic); 
  font-size: 15px;
  font-weight: 400;
  letter-spacing: .12em;
  text-shadow: 0 0 4px rgba(223, 186, 107, 0.2);
}

.price-list{
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 22px;
}

.price-list span{
  color: var(--gold-high-light);
  font-size: 15px;
  text-shadow: 0 0 6px rgba(223, 186, 107, 0.3);
}

.plan-desc{
  color: var(--text-faint);
  font-size: 14px;
}

/* 預約按鈕樣式優化 */
.cta{
  width: 100%;
  min-height: 52px;
  padding: 12px 18px;
  margin-top: 28px;
  background: rgba(20, 17, 15, 0.6);
  border: 1px solid var(--gold-classic);
  color: var(--gold-high-light);
  font-family: inherit;
  font-size: 14px;
  letter-spacing: .18em;
  cursor: pointer;
  transition: all 0.3s ease;
  text-shadow: 0 0 4px rgba(223, 186, 107, 0.5);
}

.cta:hover{
  background: rgba(223, 186, 107, 0.15);
  box-shadow: 0 0 15px rgba(223, 186, 107, 0.3);
}

/* 彈出視窗樣式優化 */
.popup{
  position: fixed; inset: 0; z-index: 999;
  display: none; align-items: flex-end; justify-content: center;
  padding: 16px; background: rgba(10, 8, 7, 0.9);
  backdrop-filter: blur(12px);
}
.popup.active{ display: flex; }
.popup-panel{
  width: 100%; max-width: 520px; max-height: 85svh; overflow: auto;
  background: #110e0c; border: 1px solid rgba(223, 186, 107, 0.3);
  padding: 32px 22px; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
}
.popup-title{
  color: var(--gold-classic); text-align: center;
  font-size: 28px; font-weight: 300; letter-spacing: .18em; margin-bottom: 24px;
  text-shadow: 0 0 8px rgba(223, 186, 107, 0.5);
}
.tag-grid{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
.tag input{ display: none; }
.tag span{
  display: block; padding: 12px 2px; text-align: center;
  color: rgba(245, 242, 235, 0.4); border: 1px solid rgba(245, 242, 235, 0.08); font-size: 12px; cursor: pointer;
}
.tag input:checked + span{
  color: var(--gold-high-light); border-color: var(--gold-classic); background: rgba(223, 186, 107, 0.1);
}
.booking{
  background: #0a0807; border: 1px solid rgba(255,255,255,.05);
  color: rgba(245, 242, 235, 0.7); padding: 16px; font-size: 13px; line-height: 1.8; white-space: pre-line; margin-bottom: 16px;
}
.actions{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn{ height: 46px; background: transparent; border: 1px solid rgba(245, 242, 235, 0.15); color: rgba(245, 242, 235, 0.6); font-family: inherit; letter-spacing: .16em; cursor: pointer; }
.btn-primary{ border-color: var(--gold-classic); color: var(--gold-high-light); text-shadow: 0 0 4px rgba(223, 186, 107, 0.4); }

.footer{
  position: relative; z-index: 2;
  padding: 80px 24px 100px; text-align: center;
  color: rgba(245, 242, 235, 0.3); font-size: 11px; line-height: 2; letter-spacing: .18em;
}

@media(min-width:900px){
  .section{ padding: 100px 8vw; }
  .stage{ max-width: 1200px; grid-template-columns: 1fr 1fr; gap: 80px; }
  .title{ font-size: 76px; }
  .copy{ font-size: 20px; }
  .photo img{ min-height: 640px; object-fit: cover; }
  .panel-grid{
