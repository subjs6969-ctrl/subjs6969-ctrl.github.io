<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微光本態｜深深</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f5f0e8;
      --bg-2: #efe7dc;
      --ink: #141414;
      --ink-soft: rgba(20,20,20,0.72);
      --ink-faint: rgba(20,20,20,0.44);
      --line: rgba(20,20,20,0.12);
      --line-strong: rgba(20,20,20,0.22);
      --accent: #8a6b46;
      --white: #ffffff;
      --panel: rgba(255,255,255,0.58);
      --shadow: 0 24px 60px rgba(20,20,20,0.08);
      --max: 1280px;
      --ease: cubic-bezier(.22,1,.36,1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0)),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(20,20,20,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20,20,20,0.025) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: 0.35;
      z-index: 0;
    }

    .site {
      position: relative;
      z-index: 1;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(245,240,232,0.74);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner,
    .hero,
    .section,
    .footer {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .nav-inner {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand small,
    .nav-links a,
    .kicker,
    .meta,
    label,
    .footer {
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 11px;
    }

    .brand small,
    .meta,
    .nav-links a,
    label {
      color: var(--ink-faint);
    }

    .brand strong {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      transition: color .25s ease, opacity .25s ease;
    }

    .nav-links a:hover { color: var(--ink); }

    .nav-cta {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      color: var(--ink) !important;
    }

    .hero {
      min-height: calc(100vh - 74px);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 32px;
      align-items: stretch;
      padding: 40px 0 70px;
    }

    .hero-left,
    .hero-right {
      position: relative;
      min-height: 680px;
    }

    .hero-copy {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.34);
      box-shadow: var(--shadow);
      padding: 34px;
    }

    .hero-top {
      max-width: 760px;
    }

    .kicker {
      display: inline-block;
      margin-bottom: 22px;
      color: var(--ink-faint);
    }

    .hero-title,
    .section-title,
    .editorial-quote,
    .card-title,
    .feature-number {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(54px, 8vw, 118px);
      line-height: 0.96;
      max-width: 7.2em;
    }

    .hero-title span {
      display: block;
      margin-top: 12px;
      font-size: 0.42em;
      letter-spacing: 0.10em;
      color: var(--ink-soft);
    }

    .hero-desc {
      margin: 28px 0 0;
      max-width: 34em;
      font-size: 16px;
      line-height: 2.0;
      color: var(--ink-soft);
    }

    .hero-bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding-top: 30px;
      border-top: 1px solid var(--line);
    }

    .hero-note {
      max-width: 24em;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.9;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 20px;
      text-decoration: none;
      transition: transform .35s var(--ease), background .25s ease, color .25s ease, border-color .25s ease;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border: 1px solid var(--line-strong);
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-dark {
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
    }

    .btn-light {
      background: transparent;
      color: var(--ink);
    }

    .hero-right {
      display: grid;
      grid-template-rows: 1fr 180px;
      gap: 18px;
    }

    .editorial-panel,
    .info-strip,
    .panel,
    .feature,
    .form-panel,
    .entry-panel {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.34);
      box-shadow: var(--shadow);
    }

    .editorial-panel {
      position: relative;
      padding: 28px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .editorial-panel::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(20,20,20,0.10);
      pointer-events: none;
    }

    .editorial-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .editorial-quote {
      font-size: clamp(34px, 4vw, 56px);
      line-height: 1.12;
      max-width: 7em;
    }

    .editorial-mark {
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }

    .editorial-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 26px;
    }

    .mini-box {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .mini-box span {
      display: block;
      margin-bottom: 8px;
      color: var(--ink-faint);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .mini-box strong {
      display: block;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.65;
    }

    .info-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }

    .strip-item {
      padding: 22px;
      border-left: 1px solid var(--line);
    }

    .strip-item:first-child { border-left: none; }

    .feature-number {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .strip-item p {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.85;
      font-size: 14px;
    }

    .section {
      padding: 82px 0;
      border-top: 1px solid var(--line);
    }

    .section-head {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 26px;
      margin-bottom: 34px;
    }

    .section-title {
      margin: 0;
      font-size: clamp(34px, 4.8vw, 72px);
      line-height: 1.04;
      max-width: 10em;
    }

    .section-desc {
      margin-top: 18px;
      max-width: 44em;
      color: var(--ink-soft);
      line-height: 1.95;
      font-size: 16px;
    }

    .about-grid,
    .structure-grid,
    .entry-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .panel,
    .form-panel,
    .entry-panel {
      padding: 28px;
    }

    .editorial-quote.small {
      font-size: clamp(28px, 3vw, 44px);
      max-width: 9em;
    }

    .list {
      display: grid;
      gap: 18px;
      margin-top: 14px;
    }

    .list-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 16px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .list-row:first-child { border-top: none; padding-top: 0; }

    .list-row .meta { padding-top: 3px; }

    .list-row p,
    .body-copy,
    .feature p,
    .entry-list li,
    .helper {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.9;
      font-size: 15px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .feature {
      padding: 24px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform .35s var(--ease), border-color .25s ease;
    }

    .feature:hover {
      transform: translateY(-3px);
      border-color: var(--line-strong);
    }

    .card-title {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.05;
    }

    .entry-list {
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 14px;
    }

    .entry-list li {
      position: relative;
      padding-left: 18px;
    }

      content: "";
      position: absolute;
      left: 0;
      top: 11px;
