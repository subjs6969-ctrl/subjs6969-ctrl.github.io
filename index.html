<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>微光・之上｜蘇純</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#05070b;
    color:#f4efe8;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Noto Serif TC",
    "PingFang TC",
    sans-serif;
    overflow-x:hidden;
}

/* 第一頁 */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(.42);
}

.hero-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
    to bottom,
    rgba(0,0,0,.2),
    rgba(0,0,0,.58)
    );
}

.hero-content{
    position:absolute;
    left:8%;
    top:20%;
    z-index:2;
    width:84%;
}

.hero-top{
    font-size:18px;
    letter-spacing:8px;
    color:rgba(255,255,255,.7);
    margin-bottom:26px;
    font-weight:200;
}

.hero-name{
    font-size:22px;
    letter-spacing:6px;
    color:rgba(255,255,255,.78);
    margin-bottom:70px;
    font-weight:300;
}

.hero-title{
    font-size:62px;
    line-height:1.55;
    letter-spacing:5px;
    font-weight:200;
    color:#f5efe8;
    margin-bottom:70px;
}

.hero-sub{
    font-size:18px;
    line-height:2.2;
    letter-spacing:3px;
    color:rgba(255,255,255,.62);
    font-weight:300;
}

.timeline{
    margin-top:70px;
    color:rgba(255,255,255,.42);
    letter-spacing:4px;
    font-size:15px;
    font-weight:300;
}

.timeline span{
    display:block;
    margin-top:22px;
    font-size:17px;
    letter-spacing:3px;
    color:rgba(255,255,255,.56);
    font-style:italic;
}

.scroll{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,.4);
    font-size:28px;
    z-index:2;
    animation:float 2s infinite;
}

@keyframes float{
    0%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,8px);}
    100%{transform:translate(-50%,0);}
}

/* 第二頁 */

.about-section{
    width:100%;
    background:#060606;
    padding:120px 24px;
}

.about-wrap{
    width:100%;
    max-width:760px;
    margin:auto;
}

.about-mini{
    font-size:13px;
    letter-spacing:4px;
    color:rgba(255,255,255,.42);
    margin-bottom:40px;
}

.about-main-image{
    width:100%;
    margin-bottom:55px;
}

.about-main-image img{
    width:100%;
    display:block;
    border-radius:2px;
}

.about-title{
    font-size:40px;
    line-height:1.8;
    letter-spacing:4px;
    font-weight:200;
    margin-bottom:45px;
    color:#f5efe8;
}

.about-text{
    font-size:17px;
    line-height:2.5;
    letter-spacing:2px;
    color:rgba(255,255,255,.72);
    font-weight:300;
    margin-bottom:80px;
}

.about-gallery{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.gallery-item{
    overflow:hidden;
    background:#111;
}

.gallery-item img{
    width:100%;
    display:block;
    transition:1.2s;
}

.gallery-item img:hover{
    transform:scale(1.03);
    opacity:.92;
}

/* 手機 */

@media(max-width:768px){

.hero-content{
    top:18%;
}

.hero-top{
    font-size:16px;
    letter-spacing:6px;
}

.hero-name{
    font-size:18px;
    margin-bottom:55px;
}

.hero-title{
    font-size:34px;
    line-height:1.8;
    margin-bottom:55px;
}

.hero-sub{
    font-size:15px;
    line-height:2.1;
}

.timeline{
    margin-top:55px;
    font-size:13px;
}

.timeline span{
    font-size:15px;
}

.about-section{
    padding:95px 22px;
}

.about-title{
    font-size:31px;
}

.about-text{
    font-size:15px;
    line-height:2.3;
}

}

</style>
</head>

<body>

<!-- 第一頁 -->

<section class="hero">

    <img src="hero.jpg" alt="蘇純">

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <div class="hero-top">
            《微光・之上》
        </div>

        <div class="hero-name">
            蘇純｜無限旅程
        </div>

        <div class="hero-title">
            值得，<br>
            所以不將就。
        </div>

        <div class="hero-sub">
            感謝深深，蘇純上線。
        </div>

        <div class="timeline">
            2019.深深｜2026.蘇純
            <span>It’s all my life</span>
        </div>

    </div>

    <div class="scroll">
        ↓
    </div>

</section>

<!-- 第二頁 -->

<section class="about-section">

    <div class="about-wrap">

        <div class="about-mini">
            微炙蘇純
        </div>

        <div class="about-main-image">
            <img src="kept-01.jpg" alt="蘇純">
        </div>

        <div class="about-title">
            曾經以為，<br>
            這圈子很簡單。
        </div>

        <div class="about-text">
            後來才明白，<br>
            深的從來不是圈子，<br>
            而是人性。<br><br>

            感謝曾經的深深，<br>
            才有現在的蘇純。<br><br>

            自己的世界，<br>
            照自己的方式生活。
        </div>

        <div class="about-gallery">

            <div class="gallery-item">
                <img src="kept-01.jpg" alt="">
            </div>

            <div class="gallery-item">
                <img src="kept-02.jpg" alt="">
            </div>

            <div class="gallery-item">
                <img src="kept-03.jpg" alt="">
            </div>

            <div class="gallery-item">
                <img src="kept-04.jpg" alt="">
            </div>

        </div>

    </div>

</section>

</body>
</html>
