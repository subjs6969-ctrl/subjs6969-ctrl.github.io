<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微光之上｜無限旅程</title>
  <style>
    :root {
      --gold-hi: #f5d77f;
      --gold-main: #d4af37;
      --gold-low: #9f7d28;
      --gold-dim: rgba(212,175,55,.18);
      --bg: #060606;
      --bg-soft: #0b0b0b;
      --panel: rgba(255,255,255,.025);
      --panel-strong: rgba(255,255,255,.055);
      --text: rgba(255,255,255,.88);
      --text-soft: rgba(255,255,255,.62);
      --text-faint: rgba(255,255,255,.34);
      --line: rgba(212,175,55,.16);
      --line-soft: rgba(255,255,255,.08);
      --glow-soft: 0 0 18px rgba(212,175,55,.18);
      --glow-title: 0 0 10px rgba(212,175,55,.45), 0 0 34px rgba(212,175,55,.14);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      --ease-lux: cubic-bezier(.16, 1, .3, 1);
      --max: 1120px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(212,175,55,.09), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.035), transparent 28%),
        linear-gradient(180deg, #050505 0%, #090909 46%, #030303 100%);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      line-height: 1.8;
      letter-spacing: .06em;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
      opacity: .35;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.68) 100%);
    }
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .75;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    img {
      max-width: 100%;
      display: block;
    }
    .site-shell {
      position: relative;
      z-index: 3;
    }
    .section {
      min-height: 100svh;
      display: flex;
      align-items: center;
      padding: clamp(72px, 9vw, 120px) 24px;
      position: relative;
      border-bottom: 1px solid rgba(212,175,55,.055);
      overflow: hidden;
    }
    .section::before {
      content: "";
      position: absolute;
      inset: 12%;
      border: 1px solid rgba(212,175,55,.045);
      pointer-events: none;
      opacity: .8;
    }
    .layout {
      width: min(100%, var(--max));
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, .85fr);
      gap: clamp(36px, 7vw, 96px);
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .layout.center {
      display: block;
      max-width: 820px;
      text-align: center;
    }
    .eyebrow {
      color: var(--text-faint);
      font-size: 12px;
      letter-spacing: .38em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .title {
      color: var(--gold-hi);
      font-weight: 300;
      font-size: clamp(34px, 6vw, 72px);
      line-height: 1.08;
      letter-spacing: .18em;
      text-shadow: var(--glow-title);
      margin-bottom: 28px;
    }
    .title.small {
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: .14em;
    }
    .title.statement {
      color: rgba(255,255,255,.92);
      text-shadow: none;
      font-size: clamp(42px, 7vw, 88px);
      letter-spacing: .26em;
    }
    .copy {
      color: var(--text-soft);
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 2.25;
      white-space: pre-line;
      max-width: 560px;
    }
    .center .copy {
      margin-inline: auto;
      max-width: 760px;
    }
    .muted {
      color: var(--text-faint);
      font-size: 14px;
    }
    .gold {
      color: var(--gold-hi);
      text-shadow: var(--glow-soft);
    }
    .media-frame {
      position: relative;
      isolation: isolate;
    }
    .media-frame::before {
      content: "";
      position: absolute;
      inset: 8%;
      z-index: -1;
      background: radial-gradient(circle, rgba(212,175,55,.18), transparent 64%);
      filter: blur(28px);
      opacity: .8;
    }
    .media-frame img {
      width: 100%;
      max-height: 78svh;
      object-fit: contain;
      border: 1px solid rgba(212,175,55,.12);
      box-shadow:
        0 24px 80px rgba(0,0,0,.72),
        0 0 0 1px rgba(255,255,255,.025);
      filter: saturate(.92) contrast(1.05);
    }
    .journey {
      background:
        radial-gradient(circle at 50% 50%, rgba(212,175,55,.07), transparent 36%),
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.72));
    }
    .service-note {
      margin-top: 36px;
      color: rgba(212,175,55,.58);
      font-size: 12px;
      letter-spacing: .22em;
    }
    .promise-grid {
      width: min(100%, 1000px);
      margin: 42px auto 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .promise-card {
      min-height: 230px;
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
      border: 1px solid var(--line);
      padding: 28px 22px;
      text-align: left;
      box-shadow: 0 28px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }
    .promise-card h3 {
      color: var(--gold-hi);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: .18em;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(212,175,55,.16);
      text-align: center;
    }
    .promise-card p {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 2.1;
      white-space: pre-line;
    }
    .cta {
      margin-top: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 280px;
      height: 56px;
      border: 1px solid rgba(212,175,55,.42);
      background:
        linear-gradient(90deg, rgba(212,175,55,.06), rgba(255,255,255,.02), rgba(212,175,55,.06));
      color: var(--gold-hi);
      letter-spacing: .28em;
      font-size: 14px;
      cursor: pointer;
      text-shadow: var(--glow-soft);
      box-shadow: 0 0 24px rgba(212,175,55,.08);
      transition: transform .45s var(--ease-lux), background .45s var(--ease-lux), color .45s var(--ease-lux), box-shadow .45s var(--ease-lux);
    }
    .cta:hover {
      transform: translateY(-2px);
      background: var(--gold-main);
      color: #070707;
      box-shadow: 0 0 34px rgba(212,175,55,.38);
      text-shadow: none;
    }
    .reveal {
      opacity: 0;
      transform: translateY(34px);
      transition: opacity 1.2s var(--ease-lux), transform 1.2s var(--ease-lux);
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    .float-soft {
      animation: floatSoft 8s ease-in-out infinite;
    }
    @keyframes floatSoft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .shimmer {
      position: relative;
      overflow: hidden;
    }
    .shimmer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 30%, rgba(245,215,127,.12) 45%, transparent 60%);
      transform: translateX(-120%);
      animation: shimmer 6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%, 65% { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }
    .lux-popup {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(24px);
    }
    .lux-popup.active {
      display: flex;
    }
    .popup-panel {
      width: min(100%, 520px);
      max-height: 88svh;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.018)),
        #090909;
      border: 1px solid rgba(212,175,55,.24);
      box-shadow: 0 40px 100px rgba(0,0,0,.82), 0 0 48px rgba(212,175,55,.08);
      padding: 34px 26px;
    }
    .popup-title {
      text-align: center;
      color: var(--gold-hi);
      font-size: 20px;
      font-weight: 300;
      letter-spacing: .32em;
      margin-bottom: 28px;
      text-shadow: var(--glow-title);
    }
    .form-block {
      margin-bottom: 24px;
    }
    .form-label {
      color: var(--text);
      font-size: 14px;
      letter-spacing: .16em;
      margin-bottom: 12px;
      padding-left: 10px;
      border-left: 2px solid var(--gold-main);
    }
    .tag-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .tag {
      position: relative;
    }
    .tag input {
      position: absolute;
      opacity: 0;
    }
    .tag span {
      display: block;
      padding: 12px 4px;
      text-align: center;
      font-size: 13px;
      color: var(--text-faint);
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,.018);
      cursor: pointer;
      transition: .3s var(--ease-lux);
    }
    .tag input:checked + span {
      color: #fff;
      border-color: var(--gold-main);
      background: rgba(212,175,55,.11);
      box-shadow: 0 0 14px rgba(212,175,55,.24);
    }
