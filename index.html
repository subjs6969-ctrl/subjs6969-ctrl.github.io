<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>《微光・之上》｜狐九</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#040404;
color:#ece6df;
font-family:
"PingFang TC",
"Noto Serif TC",
serif;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,255,255,.04),
transparent 48%);
pointer-events:none;
z-index:-2;
}

section{
padding:120px 28px;
position:relative;
}

.wrap{
max-width:460px;
margin:auto;
position:relative;
z-index:2;
}

.site-title{
position:fixed;
top:28px;
left:0;
right:0;
text-align:center;
font-size:14px;
letter-spacing:.34em;
color:#d8cec5;
z-index:999;
}

.hero{
min-height:100svh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero-bg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.34;
filter:
brightness(.48)
blur(1px);
z-index:0;
}

.hero-overlay{
position:absolute;
inset:0;
background:
linear-gradient(
to bottom,
rgba(0,0,0,.28),
rgba(0,0,0,.78)
);
z-index:1;
}

.hero-sub{
font-size:16px;
letter-spacing:.24em;
color:#a2968d;
margin-bottom:22px;
}

h1{
font-size:54px;
font-weight:200;
line-height:1.9;
letter-spacing:.12em;
color:#f1ece5;
margin-bottom:18px;
}

.since{
font-size:15px;
letter-spacing:.44em;
color:#766d65;
margin-bottom:52px;
}

.nav{
display:flex;
flex-direction:column;
gap:18px;
}

.nav a{
text-decoration:none !important;
color:#e8dfd7 !important;
border:1px solid rgba(255,255,255,.08);
padding:22px;
border-radius:999px;
font-size:18px;
font-weight:300;
letter-spacing:.18em;
background:rgba(255,255,255,.02);
backdrop-filter:blur(10px);
transition:.35s;
}

.nav a:hover{
background:rgba(255,255,255,.08);
transform:translateY(-2px);
}

.label{
font-size:14px;
letter-spacing:.34em;
color:#8e847b;
margin-bottom:34px;
text-align:center;
}

h2{
font-size:42px;
font-weight:200;
line-height:1.8;
letter-spacing:.12em;
text-align:center;
margin-bottom:34px;
}

p{
font-size:18px;
line-height:2.3;
text-align:center;
font-weight:300;
color:#d5ccc4;
}

.space{
height:34px;
}

.divider{
width:1px;
height:90px;
background:rgba(255,255,255,.08);
margin:60px auto;
}

.card{
border-top:1px solid rgba(255,255,255,.08);
padding-top:34px;
margin-top:34px;
}

.plan-title{
font-size:28px;
font-weight:200;
letter-spacing:.12em;
margin-bottom:16px;
text-align:center;
}

.price{
font-size:18px;
letter-spacing:.2em;
color:#b6aba2;
margin-bottom:18px;
text-align:center;
}

.list{
line-height:2.2;
font-size:17px;
text-align:center;
color:#d6cdc5;
}

.footer{
padding:80px 24px 120px;
text-align:center;
font-size:13px;
letter-spacing:.34em;
color:#766d66;
}

@media(max-width:420px){

h1{
font-size:44px;
}

h2{
font-size:34px;
}

}

</style>
</head>

<body>

<div class="site-title">
《微光・之上》
</div>

<section class="hero" id="home">

<img src="hero.jpg" class="hero-bg">

<div class="hero-overlay"></div>

<div class="wrap">

<div class="hero-sub">
狐九｜無限旅程
</div>

<h1>
值得<br>
所以不將就
</h1>

<div class="since">
SINCE.2019
</div>

<div class="nav">
<a href="#story">微炙狐九
