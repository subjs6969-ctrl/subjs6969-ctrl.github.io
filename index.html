<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="apple-touch-icon" href="apple-touch-icon.jpg">
<link rel="icon" type="image/png" href="apple-touch-icon.jpg">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>微光・之上｜蘇九</title>
<style>
/* --- 原有核心樣式 (保持不變) --- */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030303;--title:#E8DCC8;--accent:#F2D6A2;--text:#F5F2EC;--shadow:rgba(0,0,0,.95);}
html{scroll-behavior:smooth;scroll-snap-type:y proximity;background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;overflow-x:hidden;letter-spacing:.15em;}
section{position:relative;min-height:100svh;width:100%;overflow:hidden;scroll-snap-align:start;display:flex;align-items:center;padding:60px 28px;z-index:3;}
.bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.08);transition:transform 2s cubic-bezier(.16,1,.3,1);z-index:1;}
section.in-view .bg{transform:scale(1);}
.content{position:relative;z-index:4;width:100%;max-width:600px;margin:0 auto;}
.center{text-align:center}
h1,h2,.plan-title{color:var(--title);font-weight:300;text-shadow:0 3px 10px var(--shadow);}
h2{font-size:clamp(42px,9vw,58px);margin-bottom:36px;}
.line{color:var(--text);font-size:clamp(16px,4.3vw,21px);line-height:2.1;margin:6px 0;opacity:0;transform:translateY(15px);transition:opacity 1.5s cubic-bezier(.16,1,.3,1),transform 1.5s cubic-bezier(.16,1,.3,1);transition-delay:calc(var(--i) * .26s);}
section.in-view .line{opacity:1;transform:translateY(0);}
.btn{display:inline-block;margin-top:40px;padding:14px 45px;border:1.5px solid var(--accent);border-radius:999px;color:var(--title);background:rgba(3,3,3,.75);cursor:pointer;font-size:15px;letter-spacing:.25em;}
.btn:hover{background:var(--accent);color:#000;}

/* --- 預約彈窗 CSS 修正版 --- */
#su9BookingPopup {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); z-index: 999999;
  justify-content: center; align-items: center; padding: 20px; overflow-y: auto;
}
.su9-booking-panel {
  background: #111; width: 100%; max-width: 450px; border: 1px solid #333;
  border-radius: 12px; padding: 25px; color: #fff;
}
.su9-form-item { margin-bottom: 15px; }
.su9-form-item .title { display: block; color: #F2D6A2; font-size: 13px; margin-bottom: 5px; }
input[type="text"], input[type="radio"] { background: #222; border: 1px solid #444; color: white; padding: 8px; width: 100%; }
.su9-options label { display: block; font-size: 13px; margin-bottom: 5px; }
</style>
</head>
<body>

<section class="page1"><div class="bg"></div><div class="content"><h1>微光・之上</h1><p>蘇九</p></div></section>
<section class="page10">
  <div class="content center">
    <h2>開始旅程</h2>
    <button class="btn" onclick="document.getElementById('su9BookingPopup').style.display='flex'">閱讀規定並預約</button>
  </div>
</section>

<div id="su9BookingPopup">
    <div class="su9-booking-panel">
        <h2 style="text-align:center; margin-bottom:20px; font-size:20px;">預約單</h2>
        <div class="su9-form-item">
            <label class="title">LINE 稱號：</label>
            <input type="text" id="su9_name">
        </div>
        <button onclick="copyAndClose()" style="width:100%; padding:12px; background:#F2D6A2; border:none; cursor:pointer;">複製預約並打開 LINE</button>
        <button onclick="document.getElementById('su9BookingPopup').style.display='none'" style="width:100%; margin-top:10px; background:transparent; border:1px solid #444; color:#888; padding:8px;">關閉</button>
    </div>
</div>

<script>
    function copyAndClose() {
        const name = document.getElementById('su9_name').value;
        const text = "您好，我想預約。LINE 稱號：" + name;
        navigator.clipboard.writeText(text);
        alert("已複製！將為您跳轉至 LINE。");
        window.location.href = "https://line.me/ti/p/..."; // 記得改成您的連結
    }
</script>

</body>
</html>
