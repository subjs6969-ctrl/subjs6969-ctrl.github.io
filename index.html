<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微光・之上｜蘇純</title>

<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#ece3d7;
  overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Serif TC",serif;
}

.hero{
  min-height:100svh;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:0 7vw 11vh;
  overflow:hidden;
  background:#050505;
}

.hero-image{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:74% 86%;
  filter:brightness(.58) contrast(.88) saturate(.82);
  transform:scale(1);
  animation:heroBreath 6s ease-in-out infinite alternate;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.74) 0%,
      rgba(0,0,0,.48) 46%,
      rgba(0,0,0,.26) 100%
    );
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  transform:scale(1);
  animation:contentBreath 6s ease-in-out infinite alternate;
}

.brand,
.slogan,
.sub,
.scroll{
  opacity:0;
  filter:blur(12px);
  transform:scale(.985);
  animation:fadeInDeep 2.6s ease forwards;
}

.brand{
  font-size:15px;
  line-height:2.15;
  letter-spacing:.28em;
  color:rgba(236,227,215,.78);
  margin-bottom:42px;
  animation-delay:1.8s;
}

.slogan{
  max-width:260px;
  font-size:26px;
  line-height:1.55;
  letter-spacing:.08em;
  font-weight:200;
  color:rgba(236,227,215,.78);
  margin-bottom:34px;
  animation-delay:3.4s;
}

.sub{
  font-size:14px;
  line-height:2;
  letter-spacing:.14em;
  color:rgba(236,227,215,.62);
  animation-delay:5s;
}

.scroll{
  margin-top:60px;
  font-size:18px;
  color:rgba(236,227,215,.34);
  animation:
    fadeInDeep 2.6s ease forwards 6.8s,
    arrowBreath 3.2s ease-in-out infinite 9s;
}

@keyframes fadeInDeep{
  from{
    opacity:0;
    filter:blur(12px);
    transform:scale(.985);
  }

  to{
    opacity:1;
    filter:blur(0);
    transform:scale(1);
  }
}

@keyframes heroBreath{
  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.035);
  }
}

@keyframes contentBreath{
  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.018);
  }
}

@keyframes arrowBreath{
  0%,100%{
    opacity:.28;
    transform:translateY(0);
  }

  50%{
    opacity:.68;
    transform:translateY(8px);
  }
}
</style>
</head>

<body>

<section class="hero" id="top">
  <img class="hero-image" src="./hero.jpeg" alt="蘇純">

  <div class="hero-content">
    <div class="brand">
      《微光・之上》<br>
      蘇純｜無限旅程
    </div>

    <div class="slogan">
      值得，<br>
      所以不將就。
    </div>

    <div class="sub">
      感謝深深，蘇純上線。
    </div>

    <div class="scroll">
      ↓
    </div>
  </div>
</section>

</body>
</html>
