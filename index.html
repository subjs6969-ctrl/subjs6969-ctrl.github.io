<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微光・之上</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    color:rgba(255,255,255,.82);
    font-family:"PingFang TC","Noto Sans TC",-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    overflow-y:auto;
}

/* 共用動畫 */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(28px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes breatheBg{
    0%,100%{
        transform:scale(1);
        filter:brightness(.42);
    }
    50%{
        transform:scale(1.06);
        filter:brightness(.5);
    }
}

.fade-text{
    opacity:0;
    animation:fadeUp 2.4s ease forwards;
}

.delay-1{animation-delay:.3s;}
.delay-2{animation-delay:.8s;}
.delay-3{animation-delay:1.3s;}
.delay-4{animation-delay:1.8s;}

/* 底部固定語感 */
.bottom-signature-wrapper{
    position:relative;
    z-index:3;
    width:100%;
    text-align:center;
}

.bottom-signature{
    font-size:1rem;
    font-weight:200;
    letter-spacing:10px;
    color:rgba(255,255,255,.46);
    text-shadow:0 2px 12px rgba(0,0,0,.9);
}

/* 第一頁 */
.first-page{
    position:relative;
    width:100%;
    min-height:100svh;
    overflow:hidden;
    padding:54px 28px 58px 32px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:#000;
}

.first-page-bg{
    position:absolute;
    inset:0;
    background:url("hero.jpg") center center/cover no-repeat;
    z-index:1;
    animation:breatheBg 9s ease-in-out infinite;
}

.first-page::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.3);
    z-index:2;
}

.top-left-group{
    position:relative;
    z-index:3;
    margin-top:24px;
    text-align:left;
}

.main-subtitle{
    font-size:1.05rem;
    font-weight:200;
    letter-spacing:4px;
    color:rgba(255,255,255,.43);
    margin-bottom:18px;
}

.main-title{
    font-size:1.8rem;
    font-weight:300;
    letter-spacing:5px;
    color:rgba(255,255,255,.88);
}

.center-hero-group{
    position:absolute;
    top:58%;
    left:50%;
    width:88%;
    transform:translate(-50%,-50%);
    z-index:3;
    text-align:center;
}

.hero-big-text{
    display:block;
    font-size:2.15rem;
    font-weight:500;
    letter-spacing:8px;
    line-height:1.45;
    color:rgba(255,255,255,.92);
    text-shadow:0 4px 18px rgba(0,0,0,.95);
    margin-bottom:22px;
}

.sub-dates-right{
    text-align:center;
}

.date-line{
    font-size:.78rem;
    font-weight:300;
    letter-spacing:5px;
    line-height:1.9;
    color:rgba(255,255,255,.32);
}

/* 第二頁 */
.theme-page{
    position:relative;
    width:100%;
    min-height:100svh;
    overflow:hidden;
    padding:70px 24px 58px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:#000;
}

.theme-bg{
    position:absolute;
    inset:0;
    background:url("fragment01.jpg") center center/cover no-repeat;
    z-index:1;
    animation:breatheBg 10s ease-in-out infinite;
}

.theme-page::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.36);
    z-index:2;
}

.theme-content-group{
    position:relative;
    z-index:3;
    text-align:center;
}

.theme-title,
.sub-page-title{
    font-size:1.45rem;
    font-weight:200;
    letter-spacing:8px;
    color:rgba(255,255,255,.72);
}

.theme-tagline,
.sub-page-tagline{
    font-size:.8rem;
    font-weight:300;
    letter-spacing:5px;
    color:rgba(255,255,255,.38);
    margin-top:12px;
}

.theme-center-quote,
.center-quote{
    position:absolute;
    top:55%;
    left:50%;
    width:90%;
    transform:translate(-50%,-50%);
    z-index:3;
    text-align:center;
    font-size:1.18rem;
    font-weight:300;
    letter-spacing:5px;
    color:rgba(255,255,255,.72);
    text-shadow:0 2px 12px rgba(0,0,0,.95);
}

/* 第三頁 */
.second-page{
    position:relative;
    width:100%;
    min-height:100svh;
    overflow:hidden;
    padding:70px 24px 58px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:#000;
}

.second-bg{
    position:absolute;
    inset:0;
    background:url("emotion01.jpg") center center/cover no-repeat;
    z-index:1;
    animation:breatheBg 10s ease-in-out infinite;
}

.second-page::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.36);
    z-index:2;
}

/* 第四頁：微炙蘇純 */
.third-page{
    width:100%;
    min-height:100svh;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:72px 24px 58px;
}

.gallery-block{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.gallery-title{
    font-size:1.28rem;
    font-weight:200;
    letter-spacing:8px;
    color:rgba(255,255,255,.46);
    margin-bottom:34px;
}

.photo-frame{
    width:100%;
    max-width:315px;
    aspect-ratio:1 / 1.45;
    overflow:hidden;
    margin-bottom:42px;
}

.animated-photo{
    width:100%;
    height:100%;
    background:url("life01.jpg") center center/cover no-repeat;
    animation:breatheBg 10s ease-in-out infinite;
}

.text-card-panel{
    width:100%;
    max-width:330px;
    text-align:center;
    padding:0 8px;
}

.text-card-panel p{
    font-size:1rem;
    font-weight:300;
    letter-spacing:4px;
    line-height:2.05;
    color:rgba(255,255,255,.58);
    margin-bottom:22px;
}

.text-card-panel .line-4{
    font-size:1.08rem;
    font-weight:400;
    letter-spacing:5px;
    color:rgba(255,255,255,.82);
    margin-top:6px;
}

@media(max-width:430px){
    .hero-big-text{
        font-size:2rem;
        letter-spacing:7px;
    }

    .main-title{
        font-size:1.65rem;
    }

    .bottom-signature{
        font-size:.95rem;
        letter-spacing:8px;
    }
}
</style>
</head>

<body>

<section class="first-page">
    <div class="first-page-bg"></div>

    <div class="top-left-group">
        <p class="main-subtitle fade-text delay-1">《微光 · 之上》</p>
        <h1 class="main-title fade-text delay-2">蘇純 ｜ 無限旅程</h1>
    </div>

    <div class="center-hero-group">
        <span class="hero-big-text fade-text delay-2">值得，所以不將就</span>
        <div class="sub-dates-right fade-text delay-3">
            <p class="date-line">2019 . 深深承蒙大家的關照</p>
            <p class="date-line">2026 . 蘇純共邀大家一起</p>
            <p class="date-line">共啟微光旅程</p>
        </div>
    </div>

    <div class="bottom-signature-wrapper fade-text delay-4">
        <p class="bottom-signature">只給你 最真實的蘇純</p>
    </div>
</section>

<section class="theme-page">
    <div class="theme-bg"></div>

    <div class="theme-content-group">
        <h1 class="theme-title fade-text delay-1">微光 · 創作集</h1>
        <p class="theme-tagline fade-text delay-2">LIGHT IN THE SHADOWS</p>
    </div>

    <div class="theme-center-quote fade-text delay-3">值得，所以不將就</div>

    <div class="bottom-signature-wrapper fade-text delay-4">
        <p class="bottom-signature">只給你 最真實的蘇純</p>
    </div>
</section>

<section class="second-page">
    <div class="second-bg"></div>

    <div class="theme-content-group">
        <h1 class="sub-page-title fade-text delay-1">微光 · 初心</h1>
        <p class="sub-page-tagline fade-text delay-2">情感片段 ｜ 01</p>
    </div>

    <div class="center-quote fade-text delay-3">在黑暗中，尋找最純粹的光芒</div>

    <div class="bottom-signature-wrapper fade-text delay-4">
        <p class="bottom-signature">只給你 最真實的蘇純</p>
    </div>
</section>

<section class="third-page">
    <div class="gallery-block">
        <h2 class="gallery-title fade-text delay-1">【 微炙蘇純 】</h2>

        <div class="photo-frame fade-text delay-2">
            <div class="animated-photo"></div>
        </div>

        <div class="text-card-panel fade-text delay-3">
            <p class="line-1">曾經以為，這環境很簡單。</p>
            <p class="line-2">後來才明白，深的不是環境，<br>而是人性。</p>
            <p class="line-3">感謝曾經的深深，現在的蘇純。</p>
            <p class="line-4">每天笑一笑 快樂，自己找。</p>
        </div>
    </div>

    <div class="bottom-signature-wrapper fade-text delay-4">
        <p class="bottom-signature">只給你 最真實的蘇純</p>
    </div>
</section>

</body>
</html>
