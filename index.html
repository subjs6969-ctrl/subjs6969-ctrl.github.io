<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光｜深深</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#030303; color:#eee6dc; font-family:sans-serif; text-align:center; line-height:1.8; letter-spacing:0.12em; overflow-x:hidden; }
        
        /* 影片區 */
        .hero { width:100%; height:85vh; overflow:hidden; position:relative; background:#000; }
        video { width:100%; height:100%; object-fit:cover; opacity:0.7; }
        .hero-title { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:100%; }
        .hero-title h1 { font-size:32px; letter-spacing:0.4em; font-weight:300; margin-bottom:10px; }
        .hero-title p { font-size:14px; color:#a99887; letter-spacing:0.2em; }

        /* 文字流動區 */
        .intro { padding:80px 30px; max-width:600px; margin:auto; }
        .line { margin-bottom:50px; font-size:18px; color:#d4c2b1; }
        
        /* 作品網格 */
        .gallery { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px; max-width:700px; margin:auto; }
        .item { aspect-ratio:3/4; overflow:hidden; border-radius:15px; background:#111; }
        .item img { width:100%; height:100%; object-fit:cover; animation:breathe 12s infinite alternate ease-in-out; }
        @keyframes breathe { from { transform:scale(1); } to { transform:scale(1.15); } }

        /* 方案卡片 */
        .card { background:rgba(255,255,255,0.03); margin:40px 20px; padding:40px 30px; border-radius:25px; border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(10px); }
        .card h3 { font-size:22px; margin-bottom:25px; letter-spacing:0.3em; color:#eee; }
        .card p { margin:10px 0; font-size:16px; }

        .btn { display:inline-block; padding:14px 50px; border:1px solid #eee6dc; border-radius:50px; color:#eee6dc; text-decoration:none; margin-top:30px; transition:0.3s; }
        .btn:hover { background:#eee6dc; color:#000; }

        /* 滑動出現動畫 */
        .reveal { opacity:0; transform:translateY(30px); transition:1.2s ease-out; }
        .reveal.show { opacity:1; transform:translateY(0); }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline><source src="V1.mp4" type="video/mp4"></video>
        <div class="hero-title">
            <h1>微光｜深深</h1>
            <p>值得，不將就。</p>
        </div>
    </div>

    <section class="intro">
        <div class="line reveal">感覺對了，自然就有了。</div>
        <div class="line reveal">像朋友一樣相處。<br>「沒關係」，才是最舒服的關係。</div>
        
        <div class="reveal" style="margin-bottom:30px; color:#a99887; font-size:12px; letter-spacing:4px;">PORTFOLIO</div>
        <div class="gallery">
            <div class="item reveal"><img src="1.jpg"></div>
            <div class="item reveal"><img src="2.jpg"></div>
            <div class="item reveal"><img src="3.jpg"></div>
            <div class="item reveal"><img src="4.jpg"></div>
        </div>
    </section>

    <section class="intro" style="padding-top:0;">
        <div class="line reveal">人來心來，人走心走。<br>界線要有，這很重要。</div>
        <div class="line reveal">見面後若覺落差太大，直接說沒關係。<br>勉強互動，彼此都不舒服。</div>
    </section>

    <section>
        <div class="card reveal">
            <h3>微光時序</h3>
            <p>壹｜初見 2H / 5000</p>
            <p>貳｜微炙 3H / 6200</p>
            <p>參｜放鬆 8H / 13000</p>
            <p>肆｜封包 18H / 20000</p>
        </div>
        <div class="reveal" style="padding-bottom:100px;">
            <p style="color:#888; font-size:14px;">信任與默契，是旅程的開始。</p>
            <a class="btn" href="https://lin.ee/U3f5HcK">進入微光</a>
        </div>
    </section>

<script>
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add("show");
        });
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
</script>

</body>
</html>
