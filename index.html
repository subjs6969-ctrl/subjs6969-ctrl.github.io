<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>微光・之上｜蘇純</title>

<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#ece3d7;
  overflow-x:hidden;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "PingFang TC",
  "Noto Serif TC",
  serif;
}

/* HERO */

.hero{
  min-height:100svh;

  position:relative;

  display:flex;
  align-items:flex-end;

  padding:0 7vw 19vh;

  overflow:hidden;

  background:#050505;
}

.hero::before{

  content:"";

  position:absolute;
  inset:0;

  background:
  linear-gradient(
    to top,
    rgba(0,0,0,.82) 0%,
    rgba(0,0,0,.52) 42%,
    rgba(0,0,0,.28) 100%
  ),
  url("./hero.jpeg")
  center center / cover no-repeat;

  filter:
  brightness(.68)
  contrast(.82)
  saturate(.88);

  transform:scale(1);

  animation:
  heroBreath 14s ease-in-out infinite alternate;
}

.hero-content{
  position:relative;
  z-index:2;

  width:100%;
  max-width:420px;
}

/* 世界觀 */

.brand{

  font-size:15px;

  line-height:2.15;

  letter-spacing:.28em;

  color:rgba(236,227,215,.82);

  margin-bottom:34px;

  opacity:0;

  transform:
  translateY(20px);

  animation:
  fadeUp 1.8s ease forwards;

  animation-delay:1.2s;
}

/* 標語 */

.slogan{

  font-size:26px;

  line-height:1.5;

  letter-spacing:.08em;

  font-weight:200;

  color:rgba(236,227,215,.92);

  margin-bottom:34px;

  opacity:0;

  transform:
  translateY(24px);

  animation:
  fadeUp 2s ease forwards;

  animation-delay:2.2s;
}

/* 副句 */

.sub{

  font-size:14px;

  line-height:2;

  letter-spacing:.14em;

  color:rgba(236,227,215,.68);

  opacity:0;

  transform:
  translateY(18px);

  animation:
  fadeUp 1.8s ease forwards;

  animation-delay:3.4s;
}

/* Scroll */

.scroll{

  margin-top:60px;

  font-size:18px;

  color:rgba(236,227,215,.38);

  opacity:0;

  animation:
  fadeUp 1.8s ease forwards 4.5s,
  arrowBreath 3s ease-in-out infinite 6s;
}

/* 動畫 */

@keyframes fadeUp{

  to{
    opacity:1;

    transform:
    translateY(0);
  }

}

@keyframes heroBreath{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.04);
  }

}

@keyframes arrowBreath{

  0%,100%{
    opacity:.28;

    transform:
    translateY(0);
  }

  50%{
    opacity:.72;

    transform:
    translateY(8px);
  }

}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-content">

    <div class="brand">
      《微光・之上》<br>
      蘇純｜無限旅程
    </div>

    <div class="slogan">
      值得，所以不將就。
    </div>

    <div class="sub">
      感謝深深，蘇純上線。
    </div>

    <div class="scroll">
      ↓
    </div>

  </div>

</section>

</body>
</html>
