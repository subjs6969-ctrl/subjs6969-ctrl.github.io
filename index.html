    <div class="lux-popup-title">初步預約單 ＆ 項目勾選</div>
    
    <div class="lux-service-block">
      <div class="lux-service-header">✨ 基本溫度服務項目 (可多選)</div>
      <div class="lux-tag-grid">
        <label class="lux-tag-checkbox"><input type="checkbox" value="清潔" onchange="syncBookingData()"><span class="lux-tag-label">清潔</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="情慾愛撫" onchange="syncBookingData()"><span class="lux-tag-label">情慾愛撫</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="69式" onchange="syncBookingData()"><span class="lux-tag-label">69式</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="無套口交" onchange="syncBookingData()"><span class="lux-tag-label">無套口交</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="清槍" onchange="syncBookingData()"><span class="lux-tag-label">清槍</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="深喉" onchange="updateBookingText()"><span class="lux-tag-label">深喉</span></label>
      </div>
    </div>

    <div class="lux-service-block">
      <div class="lux-service-header gold">💎 情慾溫度加購項目 (可多選)</div>
      <div class="lux-tag-grid">
        <label class="lux-tag-checkbox"><input type="checkbox" value="毒龍" onchange="syncBookingData()"><span class="lux-tag-label">毒龍</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="喉射" onchange="syncBookingData()"><span class="lux-tag-label">喉射</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="情趣用品" onchange="syncBookingData()"><span class="lux-tag-label">情趣用品</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="吞精" onchange="syncBookingData()"><span class="lux-tag-label">吞精</span></label>
        <label class="lux-tag-checkbox"><input type="checkbox" value="冰火" onchange="syncBookingData()"><span class="lux-tag-label">冰火</span></label>
      </div>
    </div>

    <div class="lux-alert-rule">
      <strong>⚠️ 初次預約重要規範：</strong>
      為了保障彼此寶貴的時間，首次預約者必須先完成定金匯款。加入 LINE 後請主動出示「匯款明細截圖」或「告知末五碼」，核對看到匯款後預約才正式成立。
    </div>

    <div id="luxBookingText" class="lux-booking-box">【蘇純｜初步預約單】
預約稱呼：
預約日期與時間：
選擇服務（基本溫度 / 加購項目）：(請在上方點選項目)
另外需求自填：
是否為第一次預約：
初次預約匯款後五碼：
（加 LINE 後請附上匯款明細截圖）</div>

    <div class="lux-popup-buttons">
      <button class="lux-btn btn-gold-copy" onclick="copyLuxuryBooking()">1. 複製預約單內容</button>
      <a class="lux-btn btn-gold-next" href="https://line.me/" target="_blank" onclick="closeBookingPopup()">2. 確定預約，前往 LINE</a>
      <button class="lux-btn btn-gold-back" onclick="closeBookingPopup()">返回網頁</button>
    </div>
  </div>
</div>

<style>
/* 預約觸發按鈕 */
.glow-booking-btn {
  width: 100%;
  max-width: 280px;
  padding: 16px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.25);
  color: #fff;
  font-size: 15px;
  letter-spacing: 5px;
  cursor: pointer;
  transition: all 0.4s ease;
}
.glow-booking-btn:hover {
  background: #fff;
  color: #000;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

.lux-popup {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.94);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 99999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.lux-popup.active { display: flex; }

/* 視窗主體：黑金絲邊卡片 */
.lux-popup-content {
  background: #080808;
  border: 1px solid rgba(212, 175, 55, 0.25);
  width: 100%;
  max-width: 500px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 35px 25px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.95);

  text-align: center;

  letter-spacing: 5px;

  font-size: 14px;
  color: rgba(255,255,255,0.9);
  margin-bottom: 15px;
  letter-spacing: 2px;
  border-left: 2px solid #fff;
  padding-left: 10px;
}
.lux-service-header.gold { color: #d4af37; border-left-color: #d4af37; }

/* 三欄互動標籤網格 */
.lux-tag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

</style>

<script>
function openBookingPopup() {
  document.getElementById('luxuryBookingPopup').classList.add('active');
  syncBookingData();
}

function closeBookingPopup() {
  document.getElementById('luxuryBookingPopup').classList.remove('active');
}

// 🎯 核心功能：動態捕捉勾選，自動一秒帶入下方文字框
function syncBookingData() {
  const checkboxes = document.querySelectorAll('.lux-tag-checkbox input[type="checkbox"]');
  let checkedItems = [];
  
  checkboxes.forEach(box => {
    if (box.checked) {
      checkedItems.push(box.value);
    }
  });
  
  const finalServices = checkedItems.length > 0 ? checkedItems.join('、') : '(請在上方點選項目)';
  
  const template = `【蘇純｜初步預約單】
預約稱呼：
預約日期與時間：
選擇服務（基本溫度 / 加購項目）：${finalServices}
另外需求自填：
是否為第一次預約：
初次預約匯款後五碼：
（加 LINE 後請附上匯款明細截圖）`;

  document.getElementById('luxBookingText').innerText = template;
}

function copyLuxuryBooking(){
  const text = document.getElementById("luxBookingText").innerText;
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    alert("預約單已自動生成並複製成功！\n請至 LINE 直接「長按貼上」並主動附上匯款截圖。");
  } catch (err) {
    navigator.clipboard.writeText(text).then(function(){
      alert("預約單已自動生成並複製成功！\n請至 LINE 直接「長按貼上」並主動附上匯款截圖。");
    });
  }
  document.body.removeChild(textarea);
}
</script>
