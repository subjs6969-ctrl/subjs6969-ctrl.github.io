<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微光之上 - 無限旅程</title>
  <style>
    /* 為了方便測試，建立一個裝飾用的頂部區塊，讓網頁可以往下捲動 */
    .spacer {
      height: 100vh;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #666;
      font-size: 1.2rem;
    }

    /* ==========================================
       1. 核心 CSS 區塊（您截圖中的程式碼修改版）
       ========================================== */
    .photo-section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      
      /* 這裡替換成您的背景圖片網址 */
      background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1518173946687-a4c8a3b1f98e?q=80&w=1000');
      background-position: center;
      background-repeat: no-repeat;
      
      /* 初始狀態：照片大 */
      background-size: 112% auto; 
      transition: background-size 1.8s ease;
    }

    /* 觸發狀態：照片變小 */
    .photo-section.inview {
      background-size: 100% auto;
    }

    /* 內部文字初始狀態：小變大、向上淡入 */
    .photo-section .inner, section .fade {
      transform: scale(.96) translateY(22px);
      opacity: 0;
      transition: opacity 1.2s ease, transform 1.4s ease;
      
      /* 文字排版與顏色（配合您圖中的氛圍） */
      color: #f3e9dc;
      text-align: center;
      font-family: "Noto Serif TC", serif;
      letter-spacing: 0.5em;
    }

    /* 觸發狀態：文字回復正常大小、顯現 */
    .photo-section.inview .inner, section.inview .fade {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* 自訂文字樣式 */
    .sub-title {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.8;
    }
    .main-title {
      font-size: 4rem;
      line-height: 1.6;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="spacer">請向下滑動看動畫效果 ↓</div>

  <section class="photo-section">
    <div class="inner">
      <div class="sub-title">微光 · 之上</div>
      <div class="main-title">無 限 旅<br>程</div>
    </div>
  </section>

  <div class="spacer">這是底部</div>

  <script>
    // 建立一個觀察器
    const observer = new Intersection Observer((entries) => {
      entries.forEach(entry => {
        // 當 .photo-section 進入畫面
        if (entry.isIntersecting) {
          entry.target.classList.add('inview'); // 加上 inview 類別，觸發 CSS 動畫
        } else {
          // 如果希望每次滾上去再滾下來都有動畫，可以把下面這行取消註解：
          // entry.target.classList.remove('inview'); 
        }
      });
    }, {
      threshold: 0.2 // 當區塊有 20% 進入畫面時就觸發
    });

    // 將目標區塊綁定給觀察器
    const targetSection = document.querySelector('.photo-section');
    observer.observe(targetSection);
  </script>

</body>
</html>
