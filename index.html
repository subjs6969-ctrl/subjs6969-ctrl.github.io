
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>微光・之上</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#000;
  color:#f4efe8;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;
  line-height:2;
  overflow-x:hidden;
}

/* Hero */
.hero{
  min-height:115vh;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-start;
  background:#000;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:url("hero.jpg") center center / cover no-repeat;
  opacity:.82;
  z-index:1;
}

.hero-bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 22% 46%,rgba(255,255,255,.14),transparent 18%),
    linear-gradient(to bottom,rgba(0,0,0,.22),rgba(0,0,0,.72) 78%,#000 100%);
  z-index:2;
}

.sparkle{
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
  opacity:.16;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.75) 1px,transparent 1.7px),
    radial-gradient(circle,rgba(255,255,255,.45) 1px,transparent 2px);
  background-size:90px 90px,150px 150px;
  animation:sparkleMove 22s linear infinite;
  mix-blend-mode:screen;
}

@keyframes sparkleMove{
  from{ transform:translateY(0); }
  to{ transform:translateY(-70px); }
}

.hero-text{
  position:relative;
  z-index:5;
  width:72%;
  max-width:460px;
  margin-left:8%;
  margin-top:42vh;
  color:rgba(255,255,255,.88);
  font-size:20px;
  letter-spacing:4px;
  line-height:2.6;
  text-shadow:0 2px 20px rgba(0,0,0,.55);
}

.hero-text p{
  opacity:0;
  transform:translateY(24px);
  animation:fadeUp 1.8s ease forwards;
  margin-bottom:22px;
}

.hero-text p:nth-child(2){ animation-delay:.7s; }
.hero-text p:nth-child(3){ animation-delay:1.4s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 通用區塊 */
section{
  padding:120px 28px;
  background:#000;
}

.section-title{
  text-align:center;
  color:rgba(255,255,255,.32);
  font-size:28px;
  letter-spacing:12px;
  margin-bottom:56px;
  font-weight:400;
}

.photo{
  width:100%;
  max-width:720px;
  margin:0 auto 76px;
}

.photo img{
  width:100%;
  display:block;
  opacity:.72;
}

.text{
  max-width:680px;
  margin:0 auto;
  text-align:center;
  color:rgba(255,255,255,.62);
  font-size:22px;
  letter-spacing:7px;
  line-height:2.55;
}

.text p{
  margin-bottom:24px;
  opacity:0;
  transform:translateY(26px);
  animation:softRise 1.8s ease forwards;
}

.text p:nth-child(2){ animation-delay:.35s; }
.text p:nth-child(3){ animation-delay:.7s; }
.text p:nth-child(4){ animation-delay:1.05s; }
.text p:nth-child(5){ animation-delay:1.4s; }
.text p:nth-child(6){ animation-delay:1.75s; }

.strong{
  margin-top:50px;
  color:rgba(255,255,255,.94);
  font-size:24px;
  font-weight:700;
  letter-spacing:6px;
}

.signature{
  margin-top:36px;
  color:rgba(255,255,255,.28);
  letter-spacing:12px;
}

@keyframes softRise{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 圖片區 */
.gallery{
  display:grid;
  grid-template-columns:1fr;
  gap:42px;
  max-width:760px;
  margin:0 auto;
}

.gallery img{
  width:100%;
  display:block;
  opacity:.68;
}

/* 手機修正 */
@media(max-width:768px){
  .hero{
    min-height:118vh;
  }

  .hero-bg{
    background-position:center top;
  }

  .hero-text{
    width:72%;
    margin-left:8%;
    margin-top:43vh;
    font-size:20px;
    letter-spacing:4px;
    line-height:2.65;
  }

  section{
    padding:108px 24px;
  }

  .section-title{
    font-size:25px;
    letter-spacing:10px;
    margin-bottom:48px;
  }

  .text{
    font-size:21px;
    letter-spacing:6px;
    line-height:2.55;
  }

  .strong{
    font-size:22px;
    letter-spacing:5px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="sparkle"></div>

  <div class="hero-text">
    <p>曾經以為，這環境留下的是傷。</p>
    <p>後來才明白，深的不是黑夜。</p>
    <p>而是人性。</p>
  </div>
</section>

<section>
  <h2 class="section-title">【 微 灸 蘇 純 】</h2>

  <div class="photo">
    <img src="journey.jpg" alt="微灸蘇純">
  </div>

  <div class="text">
    <p>有些故事，</p>
    <p>不是遺忘了，</p>
    <p>而是學會靜靜放著。</p>

    <p>那些走過的黑夜，</p>
    <p>最後都成了微光。</p>

    <p class="strong">蘇純，只做最真實的自己。</p>

    <p class="signature">只給你　最真實的蘇純</p>
  </div>
</section>

<section>
  <h2 class="section-title">【 情 緒 】</h2>

  <div class="gallery">
    <img src="emotion01.jpg" alt="">
    <img src="emotion02.jpg" alt="">
    <img src="emotion03.jpg" alt="">
  </div>
</section>

<section>
  <h2 class="section-title">【 空 間 】</h2>

  <div class="gallery">
    <img src="room01.jpg" alt="">
    <img src="room02.jpg" alt="">
    <img src="room03.jpg" alt="">
  </div>
</section>

<section>
  <h2 class="section-title">【 碎 片 】</h2>

  <div class="gallery">
    <img src="fragment01.jpg" alt="">
    <img src="fragment02.jpg" alt="">
    <img src="fragment03.jpg" alt="">
  </div>
</section>

</body>
</html>
