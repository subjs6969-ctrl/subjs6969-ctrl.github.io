<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光・之上</title>
    <style>
        /* 基礎設置與手機滑動優化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: "PingFang TC", "Noto Sans TC", -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* 讓 iOS 滑動平滑 */
        }

        /* 滿版視覺區塊 */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* 背景大圖：初始 scale(1)，隨滑動變大（由遠變近） */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('hero.jpg') center/cover no-repeat;
            z-index: 1;
            filter: brightness(0.55); 
            transform: scale(1);
            will-change: transform;
        }

        /* 內容文字容器 */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding: 0 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 第一部分：主題固定在螢幕約 1/3 的位置，極慢速優雅淡入 */
        .top-group {
            margin-top: 25vh; 
            opacity: 0;
            transform: translateY(15px);
            animation: slowFadeIn 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.3s;
        }

        .main-title {
            font-size: 2.6rem;
            font-weight: 200;
            letter-spacing: 8px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
        }

        /* 第二部分：下方文字區塊（靠底部對齊，並往上推開間距） */
        .bottom-group {
            margin-top: auto;
            margin-bottom: 10vh; 
            display: flex;
            flex-direction: column;
        }

        /* 值得，所以不將就 (大字、顯眼) */
        .text-important {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 5px;
            color: #ffffff;
            margin-bottom: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            
            opacity: 0;
            transform: translateY(20px);
            animation: slowFadeIn 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.8s; /* 慢速出來 */
        }

        /* 年份歷史小字 (小字、淺色、高質感) */
        .text-history {
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5); /* 50% 透明度淺色 */
            line-height: 2;                  /* 拉開行高更優雅 */
            margin-bottom: 2.2rem;
            
            opacity: 0;
            transform: translateY(20px);
            animation: slowFadeIn 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 3.5s; /* 更慢出來 */
        }

        /* 結尾落款 (中等字體) */
        .text-signature {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.85);
            
            opacity: 0;
            transform: translateY(15px);
            animation: slowFadeIn 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 5.2s; /* 最後才出現 */
        }

        /* 極慢速優雅淡入動畫 */
        @keyframes slowFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 往下捲動提示標籤 */
        .scroll-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            opacity: 0;
            animation: slowFadeIn 1.5s forwards 6s, pulse 2.5s infinite 6s;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -5px); }
        }

        /* 下方延伸的空白捲動空間 */
        .spacer {
            height: 130vh;
            background: linear-gradient(to bottom, #000 0%, #050505 50%, #111 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #222;
            font-size: 0.9rem;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="background-image" id="heroBg"></div>

        <div class="content">
            
            <div class="top-group">
                <h1 class="main-title">《微光 · 之上》</h1>
            </div>

            <div class="bottom-group">
                <p class="text-important">值得，所以不將就</p>
                
                <p class="text-history">
                    2019.深深承蒙大家的關照<br>
                    2026.蘇純共邀大家一起<br>
                    共啟微光旅程
                </p>
                
                <p class="text-signature">蘇純 ｜ 無限旅程</p>
            </div>

        </div>

        <div class="scroll-hint">↓ 往上滑動網頁</div>
    </section>

    <div class="spacer">
        <p>— 旅程正在加載 —</p>
    </div>

    <script>
        const heroBg = document.getElementById('heroBg');
        
        // 使用高效能的手機滾動監聽
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const windowHeight = window.innerHeight;
            
            // 計算目前滑動進度 (0 到 1 之間)
            const progress = Math.min(scrollTop / windowHeight, 1);
            
            if (progress >= 0 && progress <= 1) {
                // 隨著你手指向網上滑，照片會流暢地從 1.0 放大到 1.25 倍（由遠變近）
                const scaleFactor = 1 + (progress * 0.25);
                heroBg.style.transform = `scale(${scaleFactor})`;
            }
        }, { passive: true });
    </script>
</body>
</html>
