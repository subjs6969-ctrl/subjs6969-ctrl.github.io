<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>微光・之上｜蘇純</title>

<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#ece3d7;
  overflow-x:hidden;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "PingFang TC",
  "Noto Serif TC",
  serif;
}

.hero{
  position:relative;

  min-height:100svh;

  display:flex;
  align-items:flex-end;

  padding:
  0 7vw 11vh;

  overflow:hidden;

  background:#050505;
}

.hero-image{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;

  object-position:74% center;

  filter:
  brightness(.72)
  contrast(.94)
  saturate(.88);

  transform:scale(1);

  animation:
  heroBreath 12s ease-in-out infinite alternate;
}

.hero::after{
  content:"";

  position:absolute;
  inset:0;

  background:
  linear-gradient(
    to top,
    rgba(0,0,0,.82) 0%,
    rgba(0,0,0,.42) 48%,
    rgba(0,0,0,.18) 100%
  );

  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;

  width:100%;
  max-width:420px;

  animation:
  contentBreath 12s ease-in-out infinite alternate;
}

.brand,
.slogan,
.sub,
.timeline,
.scroll{
  opacity:0;

  filter:blur(12px);

  transform:scale(.985);

  animation:
  fadeInDeep 4.8s ease forwards;
}

.brand{
  margin-bottom:42px;

  font-size:15px;
  line-height:2.2;
  letter-spacing:.28em;

  color:rgba(236,227,215,.72);

  animation-delay:1.8s;
}

.slogan{
  max-width:260px;

  margin-bottom:42px;

  font-size:30px;
  line-height:1.72;
  letter-spacing:.08em;
  font-weight:200;

  color:rgba(236,227,215,.84);

  animation-delay:4.2s;
}

.sub{
  font-size:14px;
  line-height:2;
  letter-spacing:.14em;

  color:rgba(236,227,215,.56);

  animation-delay:7s;
}

.timeline{
  margin-top:58px;

  font-size:13px;
  line-height:2.2;
  letter-spacing:.18em;

  color:rgba(236,227,215,.48);

  animation-delay:8.8s;
}

.timeline span{
  display:block;

  margin-top:12px;

  font-size:15px;
  letter-spacing:.08em;

  font-family:
  "Cormorant Garamond",
  "Times New Roman",
  serif;

  color:rgba(236,227,215,.72);
}

.scroll{
  margin-top:72px;

  font-size:18px;

  color:rgba(236,227,215,.32);

  animation:
    fadeInDeep 4.8s ease forwards 10.5s,
    arrowBreath 3.4s ease-in-out infinite 13s;
}

@keyframes fadeInDeep{

  from{
    opacity:0;
    filter:blur(12px);
    transform:scale(.985);
  }

  to{
    opacity:1;
    filter:blur(0);
    transform:scale(1);
  }

}

@keyframes heroBreath{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.04);
  }

}

@keyframes contentBreath{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.018);
  }

}

@keyframes arrowBreath{

  0%,100%{
    opacity:.24;
    transform:translateY(0);
  }

  50%{
    opacity:.72;
    transform:translateY(8px);
  }

}

</style>
</head>

<body>

<section class="hero">

  <img
    class="hero-image"
    src="./hero.jpg"
    alt="蘇純"
  >

  <div class="hero-content">

    <div class="brand">
      《微光・之上》<br>
      蘇純｜無限旅程
    </div>

    <div class="slogan">
      值得，<br>
      所以不將就。
    </div>

    <div class="sub">
      感謝深深，蘇純上線。
    </div>

    <div class="timeline">
      2019.深深｜2026.蘇純

      <span>
        It’s all my life
      </span>
    </div>

    <div class="scroll">
      ↓
    </div>

  </div>

</section>

</body>
</html>
