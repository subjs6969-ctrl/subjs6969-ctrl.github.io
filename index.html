<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微光・之上</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: "PingFang TC", "Noto Sans TC", -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 統一的電影感字體淡入動畫 */
        @keyframes cinematicFadeIn {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ─── 🎬 【第一頁：滿版主視覺】 ─── */
        .first-page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            padding: 0 24px 60px 24px;
            overflow: hidden;
        }

        .first-page-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('hero.jpg') center 25%/cover no-repeat;
            z-index: 1;
            animation: imageZoomInFirst 20s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            transform-origin: center 25%;
        }

        @keyframes imageZoomInFirst {
            0% { transform: scale(1); filter: brightness(0.4); }
            100% { transform: scale(1.12); filter: brightness(0.55); }
        }

        .first-page::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.25); z-index: 2;
        }

        .first-bottom-group {
            position: relative; z-index: 3; width: 100%; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 22px;
        }

        .first-text-important {
            font-size: 1.25rem; font-weight: 300; letter-spacing: 5px; white-space: nowrap;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            animation: cinematicFadeIn 2.5s ease forwards;
        }

        .first-text-history {
            font-size: 0.85rem; font-weight: 300; letter-spacing: 2px; color: rgba(255, 255, 255, 0.55); line-height: 1.8;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9); opacity: 0;
            animation: cinematicFadeIn 2.5s ease forwards; animation-delay: 5s;
        }


        /* ─── 🎬 【第二頁：中間版做動畫照片（對齊第一頁呈現方式）】 ─── */
        .second-page {
            width: 100%;
            min-height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }

        /* 標題居中 */
        .gallery-title {
            font-size: 1.4rem; font-weight: 300; letter-spacing: 6px; color: #fff;
            text-align: center; margin-bottom: 24px;
            animation: cinematicFadeIn 2.5s ease forwards;
        }

        /* 核心：留在中間一版做動畫的照片框，精確鎖定呈現方式與第一頁完全一樣 */
        .photo-frame {
            width: 100%;
            max-width: 340px; 
            aspect-ratio: 1 / 1.35; 
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 35px;
        }

        /* ⚙️ 修正：讓 life.jpg 網頁一開就直接執行從小到大慢速拉近的電影動畫 */
        .animated-photo {
            width: 100%;
            height: 100%;
            background: url('life.jpg') center center/cover no-repeat;
            transform-origin: center center;
            /* 與第一頁完全相同的 20秒 cubic-bezier 慢速拉近動畫軌跡 */
            animation: imageZoomInSecond 20s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes imageZoomInSecond {
            0% { transform: scale(1); filter: brightness(0.7); }
            100% { transform: scale(1.15); filter: brightness(0.95); }
        }

        /* ─── ⚙️ 質感細節：還原圖三的灰色半透明圓角文字襯底背板 ─── */
        .text-card-panel {
            width: 100%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.05); /* 微光灰色透底 */
            border-radius: 20px; /* 還原精緻大圓角 */
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* 行與行之間的呼吸空隙 */
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* 內文每隔 5 秒依序登場的時間軸 */
        .line-1 {
            font-size: 1.05rem; font-weight: 300; letter-spacing: 3px; color: rgba(255,255,255,0.95);
            animation: cinematicFadeIn 2.5s ease forwards; animation-delay: 5s; opacity: 0;
        }

        .line-2 {
            font-size: 1.05rem; font-weight: 300; letter-spacing: 3px; color: rgba(255,255,255,0.95); line-height: 1.6;
            animation: cinematicFadeIn 2.5s ease forwards; animation-delay: 10s; opacity: 0;
        }

        .line-3 {
            font-size: 1.05rem; font-weight: 300; letter-spacing: 3px; color: rgba(255,255,255,0.95);
            animation: cinematicFadeIn 2.5s ease forwards; animation-delay: 15s; opacity: 0;
        }

        .line-4 {
            font-size: 1.15rem; font-weight: 400; letter-spacing: 4px; color: #fff;
            animation: cinematicFadeIn 2.5s ease forwards; animation-delay: 20s; opacity: 0;
        }
    </style>
</head>
<body>

    <section class="first-page">
        <div class="first-page-bg"></div>
        <div class="first-bottom-group">
            <p class="first-text-important">值得，所以不將就</p>
            <p class="first-text-history">
                2019.深深承蒙大家的關照<br>
                2026.蘇純共邀大家一起<br>
                共啟微光旅程
            </p>
        </div>
    </section>


    <section class="second-page">
        
        <h2 class="gallery-title">【微炙蘇純】</h2>

        <div class="photo-frame">
            <div class="animated-photo"></div>
        </div>

        <div class="text-card-panel">
            <p class="line-1">曾經以為，這圈子很簡單。</p>
            <p class="line-2">後來才明白，深的從來不是圈子，<br>而是人性。</p>
            <p class="line-3">感謝曾經的深深，才有現在的蘇純。</p>
            <p class="line-4">自己的世界，照自己的方式生活。</p>
        </div>

    </section>

</body>
</html>
