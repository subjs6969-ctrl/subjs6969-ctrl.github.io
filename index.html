<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微光・之上｜蘇純</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#000;
  color:#f5f1eb;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;
  overflow-x:hidden;
  line-height:2;
}
a{color:inherit;text-decoration:none}

section {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 80px 24px;
  overflow: hidden;
  background: #000;
}

.section-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
  opacity: 0.35;
}

.section-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 50%, #000 100%);
  z-index: 2;
}

.section-title, .open-booking-area {
  position: relative;
  z-index: 5;
  text-shadow: 0 4px 20px rgba(0,0,0,0.9);
}

.section-title {
  text-align: center;
  color: #fff;
  font-size: 26px;
  letter-spacing: 8px;
  font-weight: bold;
  margin-bottom: 20px;
}

.section-sub {
  position: relative;
  z-index: 5;
  color: rgba(255,255,255,0.6);
  font-size: 16px;
  letter-spacing: 4px;
  margin-bottom: 50px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

/* 預約啟動大按鈕 */
.open-booking-area {
  width: 100%;
  max-width: 450px;
  text-align: center;
}
.start-btn {
  width: 100%;
  padding: 22px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: #fff;
  font-size: 18px;
  letter-spacing: 6px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}
.start-btn:hover {
  background: rgba(255, 255, 255, 0.25);
  border-color: #fff;
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

/* 彈出視窗 */
.booking-popup {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(12px);
  z-index: 999;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  padding: 15px;
}
.booking-popup.active {
  opacity: 1;
  pointer-events: auto;
}
.popup-content {
  background: #0d0d0d;
  border: 1px solid rgba(255,255,255,0.15);
  width: 100%;
  max-width: 550px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 30px 20px;
  position: relative;
}
.popup-title {
  text-align: center;
  font-size: 22px;
  letter-spacing: 4px;
  color: #fff;
  font-weight: bold;
  margin-bottom: 25px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding-bottom: 15px;
}

/* 服務內容分類區 */
.service-section {
  margin-bottom: 25px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 20px;
}
.service-type-title {
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 15px;
  border-left: 4px solid #fff;
  padding-left: 10px;
  letter-spacing: 2px;
}
.service-type-title.add-on {
  border-left-color: #d4af37; /* 加購區金黃色標示 */
  color: #d4af37;
}
.tag-container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.service-tag {
  background: rgba(255,255,255,0.08);
  color: #f5f1eb;
  padding: 6px 14px;
  font-size: 14px;
  letter-spacing: 1px;
  border: 1px solid rgba(255,255,255,0.12);
}

/* 匯款嚴格條款 */
.payment-rule {
  background: rgba(212, 175, 55, 0.08);
  border: 1px solid rgba(212, 175, 55, 0.4);
  color: #e5c158;
  padding: 18px;
  font-size: 14px;
  line-height: 1.8;
  letter-spacing: 1px;
  margin-bottom: 25px;
}
.payment-rule strong {
  color: #ff4d4d;
  font-size: 15px;
}

/* 預約單複製框 */
.booking-text {
  white-space: pre-line;
  color: #fff;
  background: rgba(255,255,255,0.05);
  border: 1px dashed rgba(255,255,255,0.25);
  font-size: 15px;
  letter-spacing: 2px;
  line-height: 2.3;
  padding: 20px;
  margin-bottom: 25px;
}

/* 按鈕群組 */
.popup-buttons {
  display: grid;
  gap: 14px;
}
.popup-btn {
  width: 100%;
  padding: 16px;
  font-size: 15px;
  letter-spacing: 4px;
  text-align: center;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
}
.btn-confirm {
  background: #fff;
  color: #000;
  border-color: #fff;
}
.btn-confirm:hover { background: rgba(255,255,255,0.8); }
.btn-copy { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); }
.btn-copy:hover { background: rgba(255,255,255,0.18); }
.btn-back { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); }
.btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

@media(max-width:768px){
  section{padding: 60px 20px;}
  .popup-content { max-height: 92vh; padding: 25px 15px; }
}
</style>
</head>
<body>

<section>
  <img src="hero.jpg" class="section-bg" alt="">
  <div class="section-overlay"></div>
  
  <div class="section-title">微光・之上｜蘇純</div>
  <div class="section-sub">值得，所以不將就。</div>
  
  <div class="open-booking-area">
    <button class="start-btn" onclick="togglePopup(true)">點擊查看內容與預約單</button>
  </div>
</section>

<div id="bookingPopup" class="booking-popup">
  <div class="popup-content">
    <div class="popup-title">旅程服務項目 ＆ 預約</div>
    
    <div class="service-section">
      <div class="service-type-title">✨ 基本溫度</div>
      <div class="tag-container">
        <span class="service-tag">清潔</span>
        <span class="service-tag">情慾愛撫</span>
        <span class="service-tag">69式</span>
        <span class="service-tag">無套口交</span>
        <span class="service-tag">清槍</span>
        <span class="service-tag">深喉</span>
      </div>
    </div>

    <div class="service-section">
      <div class="service-type-title add-on">💎 情慾溫度（可加購）</div>
      <div class="tag-container">
        <span class="service-tag">毒龍</span>
        <span class="service-tag">喉射</span>
        <span class="service-tag">情趣用品</span>
        <span class="service-tag">吞精</span>
        <span class="service-tag">冰火</span>
      </div>
    </div>

    <div class="payment-rule">
      📢 <strong>【初次預約重要守則】</strong><br>
      為保障彼此時間，<strong>首次預約者必須先完成定金匯款</strong>。加入 LINE 後請主動出示「匯款明細截圖」或「告知末五碼」，核對無誤後預約才算正式成立。無法接受請勿打擾。
    </div>

    <div id="bookingText" class="booking-text">【蘇純｜初步預約單】
預約稱呼：
預約日期：
預約時間：
選擇服務（基本/加購）：
是否有另外需求（請自填）：
是否為第一次預約：
初次約匯款後五碼：
（請於加入LINE後附上匯款明細截圖）</div>

    <div class="popup-buttons">
      <button class="popup-btn btn-copy" onclick="copyBooking()">1. 複製預約單</button>
      <a class="popup-btn btn-confirm" href="https://line.me/" target="_blank" onclick="togglePopup(false)">2. 確定預約，前往 LINE</a>
      <button class="popup-btn btn-back" onclick="togglePopup(false)">返回網頁</button>
    </div>
  </div>
</div>

<script>
function togglePopup(show) {
  const popup = document.getElementById('bookingPopup');
  if (show) {
    popup.classList.add('active');
  } else {
    popup.classList.remove('active');
  }
}

function copyBooking(){
  const text = document.getElementById("bookingText").innerText;
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  textarea.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    alert("預約單已成功複製！請至 LINE 直接貼上並附上匯款明細");
  } catch (err) {
    navigator.clipboard.writeText(text).then(function(){
      alert("預約單已成功複製！請至 LINE 直接貼上並附上匯款明細");
    });
  }
  document.body.removeChild(textarea);
}
</script>
</body>
</html>
