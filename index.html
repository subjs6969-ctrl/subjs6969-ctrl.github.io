<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微光・之上｜蘇純</title>

<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#ece3d7;
  overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Serif TC",serif;
}

.hero{
  min-height:100svh;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:0 7vw 12vh;
  overflow:hidden;
  background:#050505;
}

.hero-image{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;

  /* 新 Hero 圖：人物往右、微放大 */
  object-position:82% 76%;

  filter:
    filter:
  brightness(.74)
  contrast(.92)
  saturate(.88);

  transform:scale(1.06);
  animation:heroBreath 6s ease-in-out infinite alternate;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.78) 0%,
      rgba(0,0,0,.50) 45%,
      rgba(0,0,0,.22) 100%
    );
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  animation:contentBreath 6s ease-in-out infinite alternate;
}

.brand,
.slogan,
.sub,
.scroll{
  opacity:0;
  filter:blur(16px);
  transform:scale(.97);
  animation:fadeInDeep 5.2s cubic-bezier(.22,.61,.36,1) forwards;
}

.brand{
  font-size:15px;
  line-height:2.12;
  letter-spacing:.18em;
  color:rgba(236,227,215,.72);
  margin-bottom:44px;
  animation-delay:2s;
}

.slogan{
  max-width:300px;
  font-size:28px;
  line-height:1.52;
  letter-spacing:.12em;
  font-weight:200;
  color:rgba(236,227,215,.86);
  margin-bottom:38px;
  animation-delay:4.2s;
}

.sub{
  font-size:14px;
  line-height:2;
  letter-spacing:.14em;
  color:rgba(236,227,215,.58);
  animation-delay:6.4s;
}

.scroll{
  margin-top:66px;
  font-size:18px;
  color:rgba(236,227,215,.86);
  animation:
    fadeInDeep 5.2s cubic-bezier(.22,.61,.36,1) forwards 8.6s,
    arrowBreath 3.2s ease-in-out infinite 12s;
}

@keyframes fadeInDeep{
  0%{
    opacity:0;
    filter:blur(18px);
    transform:scale(.965);
  }

  55%{
    opacity:.22;
  }

  100%{
    opacity:1;
    filter:blur(0);
    transform:scale(1);
  }
}

@keyframes heroBreath{
  from{
    transform:scale(1.06);
  }

  to{
    transform:scale(1.095);
  }
}

@keyframes contentBreath{
  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.012);
  }
}

@keyframes arrowBreath{
  0%,100%{
    opacity:.24;
    transform:translateY(0);
  }

  50%{
    opacity:.58;
    transform:translateY(7px);
  }
}
</style>
</head>

<body>

<section class="hero" id="top">
  <img class="hero-image" src="./hero.jpg" alt="蘇純">

  <div class="hero-content">
    <div class="brand">
      《微光・之上》<br>
      蘇純｜無限旅程
    </div>

    <div class="slogan">
      值得，所以<br>
      不將就。
    </div>

    <div class="sub">
      感謝深深，蘇純上線。
    </div>

    <div class="scroll">
      ↓
    </div>
  </div>
</section>

</body>
</html>
