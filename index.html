<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微光・之上</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  color:#ece7df;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

.hero{
  min-height:100vh;
  padding:48px 28px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.logo{
  position:absolute;
  top:42px;
  left:0;
  right:0;
  text-align:center;
  font-size:18px;
  letter-spacing:.18em;
}

h1{
  margin:0;
  font-size:58px;
  line-height:1.45;
  font-weight:300;
  letter-spacing:.04em;
}

p{
  margin:52px auto 0;
  max-width:320px;
  color:#8f8f8f;
  font-size:17px;
  line-height:2.2;
  letter-spacing:.04em;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:260px;
  height:64px;
  margin-top:58px;
  border-radius:999px;
  background:#ece7df;
  color:#000;
  text-decoration:none;
  font-size:18px;
  letter-spacing:.08em;
}
</style>
</head>

<body>

<section class="hero">
  <div class="logo">微光・之上</div>

  <h1>值得，<br>所以不將就。</h1>

  <p>
    感謝深深，蘇純上線。<br>
    《微光・之上》<br>
    蘇純｜無限旅程
  </p>

  <a class="btn" href="#">開始進入</a>
</section>

</body>
</html>
