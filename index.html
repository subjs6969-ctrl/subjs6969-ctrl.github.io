<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>微光・之上｜蘇九</title>
<style>
/* 完整 CSS 樣式 */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030303;--title:#E8DCC8;--accent:#F2D6A2;--text:#F5F2EC;--shadow:rgba(0,0,0,.95);}
html{scroll-behavior:smooth;scroll-snap-type:y proximity;background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;overflow-x:hidden;letter-spacing:.15em;}
section{position:relative;min-height:100svh;width:100%;overflow:hidden;scroll-snap-align:start;display:flex;align-items:center;padding:60px 28px;z-index:3;}
.bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.08);transition:transform 2s cubic-bezier(.16,1,.3,1);z-index:1;}
section.in-view .bg{transform:scale(1);}
.content{position:relative;z-index:4;width:100%;max-width:600px;margin:0 auto;}
.center{text-align:center}
h1,h2,.plan-title{color:var(--title);font-weight:300;text-shadow:0 0 6px rgba(232,220,200,.35),0 3px 10px var(--shadow);}
h2{font-size:clamp(42px,9vw,58px);margin-bottom:36px;}
.line{color:var(--text);font-size:clamp(16px,4.3vw,21px);line-height:2.1;margin:6px 0;opacity:0;transform:translateY(15px);transition:opacity 1.5s cubic-bezier(.16,1,.3,1),transform 1.5s cubic-bezier(.16,1,.3,1);transition-delay:calc(var(--i) * .26s);}
section.in-view .line{opacity:1;transform:translateY(0);}
.btn{display:inline-block;margin-top:40px;padding:14px 45px;border:1.5px solid rgba(232,220,200,.45);border-radius:999px;color:var(--title);text-decoration:none;font-size:15px;background:rgba(3,3,3,.75);cursor:pointer;}
.btn:hover{background:var(--accent);color:#000;}

/* 彈窗樣式 */
.su9-booking-popup{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.92);z-index:99999;display:none;justify-content:center;align-items:center;padding:16px;}
.su9-booking-panel{background:#111;border:1px solid #333;width:100%;max-width:460px;max-height:85vh;border-radius:12px;padding:24px;overflow-y:auto;color:#f5f2ec;}
.su9-form-item{margin-bottom:18px;}
.su9-form-item .title{display:block;color:#F2D6A2;font-size:14px;font-weight:bold;margin-bottom:8px;}
.su9-form-item input{width:100%;background:#181818;border:1px solid #444;padding:10px;color:#fff;border-radius:6px;}
.su9-options{background:#181818;padding:12px;border-radius:8px;}
.su9-options label{display:inline-flex;align-items:center;margin:5px;cursor:pointer;}
.su9-actions{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.button{width:100%;text-align:center;padding:13px;border-radius:6px;cursor:pointer;font-weight:bold;}
.primary{background:#F2D6A2;color:#030303;}
.line-go{background:#06C755;color:#fff;text-decoration:none;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(6,199,85,0.7);}70%{box-shadow:0 0 0 10px rgba(6,199,85,0);}}
</style>
</head>
<body>

<section class="page1">
  <div class="content">
    <h1 class="line" style="--i:0">微光・之上</h1>
    <p class="line" style="--i:1">蘇九</p>
    <button class="btn" onclick="openSu9Booking()">點擊測試預約彈窗</button>
  </div>
</section>

<div class="su9-booking-popup" id="su9BookingPopup">
  <div class="su9-booking-panel">
    <h2>預約單填寫</h2>
    <div class="su9-form-item">
      <label class="title">選擇方案：</label>
      <div class="su9-options">
        <label><input type="checkbox" name="su9_plan" value="壹">壹・初見</label>
        <label><input type="checkbox" name="su9_plan" value="貳">貳・短程</label>
        <label><input type="checkbox" name="su9_plan" value="參">參・半日閒</label>
        <label><input type="checkbox" name="su9_plan" value="肆">肆・之上</label>
        <label><input type="checkbox" name="su9_plan" value="伍">伍・金好眠</label>
      </div>
    </div>
    <div class="su9-actions">
      <div class="button primary" id="su9CopyBtn" onclick="process()">確認預約，複製文字</div>
      <a id="su9LineBtn" href="https://lin.ee/Rp071XM" target="_blank" class="button line-go" style="display:none;">✨ 複製成功！點此前往私 LINE</a>
      <div class="button" style="background:#444;" onclick="closeSu9Booking()">返回</div>
    </div>
  </div>
</div>

<script>
// 基礎觀察者，讓內容淡入
document.addEventListener("DOMContentLoaded", () => {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add("in-view"); });
  }, {threshold: 0.1});
  document.querySelectorAll("section").forEach(s => obs.observe(s));
});

function openSu9Booking(){ document.getElementById('su9BookingPopup').style.display = 'flex'; }
function closeSu9Booking(){ document.getElementById('su9BookingPopup').style.display = 'none'; }

function process(){
  const plans = Array.from(document.querySelectorAll('input[name="su9_plan"]:checked')).map(i => i.value);
  if(plans.length === 0){ alert('請至少選擇一個方案'); return; }
  
  const text = '我想預約：' + plans.join('、');
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('su9CopyBtn').style.display = 'none';
    document.getElementById('su9LineBtn').style.display = 'block';
  });
}
</script>
</body>
</html>
