<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>微光・之上</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#ece5dc;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Noto Serif TC",
  serif;
  overflow-x:hidden;
}

.hero{
  min-height:100vh;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:0 8vw 12vh;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    to top,
    rgba(0,0,0,.82),
    rgba(0,0,0,.35)
  ),
  url("./hero.jpeg")
  center center / cover no-repeat;

  animation:
  heroBreath 12s ease-in-out infinite alternate;

  transform:scale(1);
}

@keyframes heroBreath{

  0%{
    transform:scale(1);
  }

  100%{
    transform:scale(1.05);
  }

}

.hero-content{
  position:relative;
  z-index:2;
  max-width:560px;
}

.brand{
  font-size:14px;
  letter-spacing:.35em;
  margin-bottom:28px;

  opacity:0;

  animation:
  fadeUp 2s ease forwards;

  animation-delay:1.5s;
}

.slogan{
  font-size:38px;
  line-height:1.8;
  font-weight:300;

  margin-bottom:32px;

  opacity:0;

  animation:
  fadeUp 2s ease forwards;

  animation-delay:2.8s;
}

.sub{
  font-size:15px;
  color:#c7b8a7;
  letter-spacing:.18em;

  opacity:0;

  animation:
  fadeUp 2s ease forwards;

  animation-delay:4s;
}

.scroll{
  margin-top:48px;

  font-size:20px;

  opacity:0;

  animation:
  fadeUp 2s ease forwards,
  float 3s ease-in-out infinite;

  animation-delay:5s;
}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:
    translateY(24px);
  }

  to{
    opacity:1;
    transform:
    translateY(0);
  }

}

@keyframes float{

  0%{
    transform:
    translateY(0);
  }

  50%{
    transform:
    translateY(8px);
  }

  100%{
    transform:
    translateY(0);
  }

}

</style>
</head>

<body>

<section class="hero">

  <div class="hero-content">

    <div class="brand">
      《微光・之上》<br>
      蘇純｜無限旅程
    </div>

    <div class="slogan">
      值得，所以不將就。
    </div>

    <div class="sub">
      感謝深深，蘇純上線。
    </div>

    <div class="scroll">
      ↓
    </div>

  </div>

</section>

</body>
</html>
