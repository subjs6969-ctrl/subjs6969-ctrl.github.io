<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光・之上</title>
    <style>
        /* 基礎樣式重設 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 滿版視覺區塊 */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 剪影背景照片：預設 scale(1)，隨著滾動由遠變近（放大） */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('hero.jpg') center/cover no-repeat;
            transform: scale(1);
            transition: transform 0.1s ease-out;
            z-index: 1;
            filter: brightness(0.65); /* 稍微壓暗以突顯文字質感 */
        }

        /* 內容文字容器 */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 20px;
        }

        /* 主副標題 */
        .title {
            font-size: 2.6rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 1.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ccc;
            letter-spacing: 5px;
            margin-bottom: 5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* 逐行慢慢浮出來的文字樣式 */
        .fade-line {
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 1.8rem 0;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 當加入 visible 類別時滑入並浮現 */
        .fade-line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 往下捲動提示標籤 */
        .scroll-hint {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #777;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, 0); }
            50% { opacity: 0.9; transform: translate(-50%, -5px); }
        }

        /* 為了產生捲動空間，延伸下方網頁長度 */
        .spacer {
            height: 120vh;
            background: linear-gradient(to bottom, #000 0%, #0a0a0a 50%, #111 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="background-image" id="bgImg"></div>

        <div class="content">
            <h1 class="title">《微光・之上》</h1>
            <p class="subtitle">蘇純 ｜ 無限旅程</p>

            <p class="fade-line">值得，</p>
            <p class="fade-line">所以不將就。</p>
        </div>

        <div class="scroll-hint">↓ 往上滑動網頁（向下捲動）</div>
    </section>

    <div class="spacer">
        <p>— 旅程正在加載 —</p>
    </div>

    <script>
        // 1. 照片由遠變近（隨著捲動流暢放大）
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / window.innerHeight;
            const bgImg = document.getElementById('bgImg');
            
            // 在第一幕範圍內，隨著往下滑，縮放比例從 1 慢慢變大到 1.18 (由遠變近)
            if (scrollPercent <= 1) {
                const scaleValue = 1 + (scrollPercent * 0.18);
                bgImg.style.transform = `scale(${scaleValue})`;
            }
        });

        // 2. 文字一行一行自動時差浮出來
        document.addEventListener("DOMContentLoaded", () => {
            const fadeLines = document.querySelectorAll('.fade-line');

            // 採用 IntersectionObserver 精準偵測
            const observerOptions = {
                root: null,
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        const index = Array.from(fadeLines).indexOf(entry.target);
                        // 每一行間隔 0.7 秒，產生優雅的逐行浮現時差
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, index * 700); 
                        
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            fadeLines.forEach(line => observer.observe(line));
        });
    </script>
</body>
</html>
