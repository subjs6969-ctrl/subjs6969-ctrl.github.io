
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機滿版測試</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            scroll-behavior: smooth;
        }
        /* 核心設定：讓每一頁都剛好是手機螢幕的 100% 滿版 */
        .fullscreen-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover; /* 照片等比例塞滿螢幕不變形 */
            overflow: hidden;
        }
        /* 暗色遮罩：確保照片前面的文字清晰 */
        .fullscreen-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        /* 文字容器穩穩置中 */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            padding: 0 30px;
            width: 100%;
        }
        .content h1 {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }
        .content p {
            font-size: 1.1rem;
            line-height: 1.6;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
        }
        /* 測試用背景照片 */
        #section1 { background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80'); }
        #section2 { background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80'); }
        #section3 { background-image: url('https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=800&q=80'); }
        #section4 { background-image: url('https://images.unsplash.com/photo-1472214222541-d510753a8707?auto=format&fit=crop&w=800&q=80'); }
    </style>
</head>
<body>

    <section class="fullscreen-section" id="section1">
        <div class="content">
            <h1>完美對齊的起點</h1>
            <p>這裡的設定原本就很舒服，畫面與文字完美對齊。</p>
        </div>
    </section>

    <section class="fullscreen-section" id="section2">
        <div class="content">
            <h1>自然流暢的延續</h1>
            <p>保持原有的流暢與自然感，滿版照片穩定呈現。</p>
        </div>
    </section>

    <section class="fullscreen-section" id="section3">
        <div class="content">
            <h1>舒服自然</h1>
            <p>從這裡開始也修正完畢了！現在照片一樣是完美滿版，文字穩穩地置中，視覺感非常舒適。</p>
        </div>
    </section>

    <section class="fullscreen-section" id="section4">
        <div class="content">
            <h1>完美對齊的後半段</h1>
            <p>修正了底層結構，現在後續的所有區塊都會乖乖排好，絕對不會再有任何跑位或對不準的問題。</p>
        </div>
    </section>

</body>
</html>
