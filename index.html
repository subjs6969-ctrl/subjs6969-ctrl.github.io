<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微光・之上</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    color:rgba(255,255,255,.85);
    font-family:
    "PingFang TC",
    "Noto Sans TC",
    -apple-system,
    sans-serif;

    overflow-x:hidden;
    overflow-y:auto;

    -webkit-font-smoothing:antialiased;
}

/* 動畫 */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes breathe{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

.fade{
    opacity:0;
    animation:fadeUp 2s ease forwards;
}

.delay1{ animation-delay:.3s; }
.delay2{ animation-delay:.8s; }
.delay3{ animation-delay:1.3s; }
.delay4{ animation-delay:1.8s; }


/* 共用 */

section{
    position:relative;
    width:100%;
    min-height:100svh;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:60px 28px;
}

.bg{
    position:absolute;
    inset:0;

    background-size:cover;
    background-repeat:no-repeat;

    z-index:1;

    animation:breathe 10s ease-in-out infinite;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.42);
    z-index:2;
}

.content{
    position:relative;
    z-index:3;
}

.bottom-signature{
    position:relative;
    z-index:3;

    text-align:center;

    font-size:.95rem;
    font-weight:200;

    letter-spacing:8px;

    color:rgba(255,255,255,.45);
}

/* 第一頁 */

.first-page .bg{
    background-image:url("hero.jpg");
    background-position:center top;
}

.top-title{
    margin-top:10px;
}

.main-subtitle{
    font-size:1rem;
    font-weight:200;

    letter-spacing:4px;

    color:rgba(255,255,255,.4);

    margin-bottom:18px;
}

.main-title{
    font-size:1.9rem;
    font-weight:300;

    letter-spacing:5px;

    color:rgba(255,255,255,.92);
}

.hero-center{
    position:absolute;

    top:55%;
    left:50%;

    transform:translate(-50%,-50%);

    width:90%;

    text-align:center;

    z-index:3;
}

.hero-big{
    font-size:2.25rem;
    line-height:1.5;

    font-weight:500;

    letter-spacing:8px;

    color:rgba(255,255,255,.95);

    text-shadow:0 4px 18px rgba(0,0,0,.9);

    margin-bottom:28px;
}

.hero-date{
    font-size:.8rem;

    line-height:2;

    letter-spacing:5px;

    color:rgba(255,255,255,.33);
}


/* 第二頁 */

.second-page .bg{
    background-image:url("fragment01.jpg");

    background-position:50% 10%;
}

.second-top{
    text-align:center;
    margin-top:10px;
}

.second-title{
    font-size:1.5rem;
    font-weight:200;

    letter-spacing:8px;

    color:rgba(255,255,255,.78);

    margin-bottom:12px;
}

.second-sub{
    font-size:.8rem;
    letter-spacing:5px;

    color:rgba(255,255,255,.38);
}

.second-quote{
    position:absolute;

    top:54%;
    left:50%;

    transform:translate(-50%,-50%);

    width:82%;

    z-index:3;

    text-align:center;

    font-size:1.08rem;

    line-height:2.15;

    letter-spacing:4px;

    color:rgba(255,255,255,.78);

    text-shadow:0 2px 12px rgba(0,0,0,.9);
}


/* 第三頁 */

.third-page{
    background:#000;
}

.gallery-title{
    text-align:center;

    font-size:1.3rem;
    font-weight:200;

    letter-spacing:8px;

    color:rgba(255,255,255,.45);

    margin-bottom:34px;
}

.photo-frame{
    width:100%;
    max-width:320px;

    aspect-ratio:1 / 1.45;

    margin:0 auto 42px auto;

    overflow:hidden;
}

.photo{
    width:100%;
    height:100%;

    background:
    url("life01.jpg")
    center center/cover no-repeat;

    animation:breathe 10s ease-in-out infinite;
}

.story-text{
    width:100%;
    max-width:330px;

    margin:auto;

    text-align:center;
}

.story-text p{
    font-size:1rem;

    line-height:2.1;

    letter-spacing:4px;

    color:rgba(255,255,255,.62);

    margin-bottom:24px;
}

.story-text .strong{
    font-size:1.08rem;

    color:rgba(255,255,255,.92);

    font-weight:500;
}

@media(max-width:430px){

    .hero-big{
        font-size:2rem;
    }

    .main-title{
        font-size:1.7rem;
    }

}

</style>
</head>

<body>


<!-- 第一頁 -->

<section class="first-page">

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="content top-title">

        <p class="main-subtitle fade delay1">
            《微光 · 之上》
        </p>

        <h1 class="main-title fade delay2">
            蘇純 ｜ 無限旅程
        </h1>

    </div>

    <div class="hero-center">

        <div class="hero-big fade delay2">
            值得，所以不將就
        </div>

        <div class="hero-date fade delay3">

            <p>2019．承蒙深深關照</p>

            <p>2026．蘇純與你啟航</p>

            <p>共赴微光旅程</p>

        </div>

    </div>

    <div class="bottom-signature fade delay4">
        只給你 最真實的蘇純
    </div>

</section>



<!-- 第二頁 -->

<section class="second-page">

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="content second-top">

        <h1 class="second-title fade delay1">
            關於蘇純
        </h1>

        <p class="second-sub fade delay2">
            ABOUT SU CHUN
        </p>

    </div>

    <div class="second-quote fade delay3">

        曾經以為，這環境很簡單。<br><br>

        後來才明白，深的不是環境，<br>
        而是人性。<br><br>

        感謝曾經的深深，現在的蘇純。<br><br>

        <strong>
        每天笑一笑 快樂，自己找。
        </strong>

    </div>

    <div class="bottom-signature fade delay4">
        只給你 最真實的蘇純
    </div>

</section>



<!-- 第三頁 -->

<section class="third-page">

    <div class="content">

        <h2 class="gallery-title fade delay1">
            【 微炙蘇純 】
        </h2>

        <div class="photo-frame fade delay2">

            <div class="photo"></div>

        </div>

        <div class="story-text fade delay3">

            <p>
                有些故事，<br>
                不是遺忘了，<br>
                而是學會靜靜放著。
            </p>

            <p>
                那些走過的黑夜，<br>
                最後都成了微光。
            </p>

            <p class="strong">
                蘇純，只做最真實的自己。
            </p>

        </div>

    </div>

    <div class="bottom-signature fade delay4">
        只給你 最真實的蘇純
    </div>

</section>

</body>
</html>
