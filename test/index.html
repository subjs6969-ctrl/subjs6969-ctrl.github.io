<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>微光・之上｜蘇純</title>

<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#ece3d7;
  overflow-x:hidden;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "PingFang TC",
  "Noto Serif TC",
  serif;
}

/* HERO */

.hero{
  position:relative;
  min-height:100svh;
  overflow:hidden;

  display:flex;
  align-items:flex-end;

  padding:0 8vw 10vh;

  background:#050505;
}

.hero-image{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;
  object-position:74% center;

  filter:
  brightness(.68)
  contrast(.92)
  saturate(.84);

  animation:
  heroFloat 18s ease-in-out infinite alternate;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    to top,
    rgba(0,0,0,.88) 0%,
    rgba(0,0,0,.42) 48%,
    rgba(0,0,0,.18) 100%
  );

  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;

  width:100%;
  max-width:420px;
}

.brand,
.slogan,
.sub,
.timeline,
.scroll{
  opacity:0;

  filter:blur(12px);

  animation:
  fadeIn 5s cubic-bezier(.22,.61,.36,1) forwards;
}

.brand{
  margin-bottom:44px;

  font-size:15px;
  line-height:2.2;
  letter-spacing:.28em;

  color:rgba(236,227,215,.72);

  animation-delay:1.5s;
}

.slogan{
  margin-bottom:46px;

  font-size:31px;
  line-height:1.72;
  letter-spacing:.08em;
  font-weight:200;

  color:rgba(236,227,215,.86);

  animation-delay:3.8s;
}

.sub{
  font-size:14px;
  line-height:2;
  letter-spacing:.14em;

  color:rgba(236,227,215,.58);

  animation-delay:6.2s;
}

.timeline{
  margin-top:60px;

  font-size:13px;
  line-height:2.2;
  letter-spacing:.18em;

  color:rgba(236,227,215,.46);

  animation-delay:8s;
}

.timeline span{
  display:block;

  margin-top:14px;

  font-size:16px;
  letter-spacing:.08em;

  font-family:
  "Cormorant Garamond",
  "Times New Roman",
  serif;

  color:rgba(236,227,215,.72);
}

.scroll{
  margin-top:70px;

  font-size:18px;

  color:rgba(236,227,215,.3);

  animation:
  fadeIn 5s ease forwards 10s,
  arrowFloat 3.5s ease-in-out infinite 12s;
}

/* 第二頁 */

.about{
  position:relative;
  min-height:100svh;

  overflow:hidden;

  background:#050505;
}

.about-image{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  object-fit:cover;
  object-position:center center;

  filter:
  brightness(.42)
  contrast(.9)
  saturate(.72);

  opacity:0;

  transform:
  scale(1.08)
  translateY(18px);

  animation:
  aboutImageIn 6s ease forwards,
  aboutFloat 18s ease-in-out infinite alternate;
}

.about::after{
  content:"";
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    to top,
    rgba(0,0,0,.9) 0%,
    rgba(0,0,0,.56) 48%,
    rgba(0,0,0,.3) 100%
  );

  z-index:1;
}

.about-content{
  position:relative;
  z-index:2;

  min-height:100svh;

  display:flex;
  flex-direction:column;
  justify-content:flex-end;

  padding:0 11vw 16vh;

  max-width:420px;
}

.about-tag,
.about-line{
  opacity:0;

  filter:blur(14px);

  animation:
  fadeIn 5.4s cubic-bezier(.22,.61,.36,1) forwards;
}

.about-tag{
  margin-bottom:58px;

  font-size:14px;
  line-height:2;
  letter-spacing:.32em;

  color:rgba(236,227,215,.42);

  animation-delay:2s;
}

.about-line{
  margin-bottom:58px;

  font-size:18px;
  line-height:2.4;
  letter-spacing:.14em;
  font-weight:200;

  color:rgba(236,227,215,.52);

  text-shadow:
  0 0 18px rgba(255,255,255,.06);
}

.about-line.one{
  animation-delay:4s;
}

.about-line.two{
  animation-delay:6.5s;
}

.about-line.three{
  animation-delay:9s;
}

.about-line.four{
  margin-bottom:0;
  animation-delay:11.5s;
}

/* 動畫 */

@keyframes fadeIn{

  from{
    opacity:0;
    filter:blur(14px);
  }

  to{
    opacity:1;
    filter:blur(0);
  }

}

@keyframes heroFloat{

  0%{
    transform:
    scale(1)
    translateY(0px);
  }

  100%{
    transform:
    scale(1.04)
    translateY(-8px);
  }

}

@keyframes aboutImageIn{

  from{
    opacity:0;

    filter:
    brightness(.25)
    contrast(.88)
    saturate(.55)
    blur(6px);
  }

  to{
    opacity:1;

    filter:
    brightness(.42)
    contrast(.9)
    saturate(.72)
    blur(0);
  }

}

@keyframes aboutFloat{

  0%{
    transform:
    scale(1.08)
    translateY(18px)
    translateX(0px);
  }

  50%{
    transform:
    scale(1.12)
    translateY(0px)
    translateX(-6px);
  }

  100%{
    transform:
    scale(1.1)
    translateY(-12px)
    translateX(4px);
  }

}

@keyframes arrowFloat{

  0%,100%{
    opacity:.28;
    transform:translateY(0);
  }

  50%{
    opacity:.72;
    transform:translateY(8px);
  }

}

/* 手機 */

@media(max-width:768px){

  .slogan{
    font-size:28px;
  }

  .about-line{
    font-size:17px;
    line-height:2.35;
  }

}

</style>
</head>

<body>

<!-- 第一頁 -->

<section class="hero">

  <img
    class="hero-image"
    src="./hero.jpg"
    alt="蘇純">

  <div class="hero-content">

    <div class="brand">
      《微光・之上》<br>
      蘇純｜無限旅程
    </div>

    <div class="slogan">
      值得，<br>
      所以不將就。
    </div>

    <div class="sub">
      感謝深深，蘇純上線。
    </div>

    <div class="timeline">
      2019.深深｜2026.蘇純

      <span>
        It’s all my life
      </span>
    </div>

    <div class="scroll">
      ↓
    </div>

  </div>

</section>

<!-- 第二頁 -->

<section class="about">

  <img
    class="about-image"
    src="./kept-01.jpg"
    alt="微炙蘇純">

  <div class="about-content">

    <div class="about-tag">
      微炙蘇純
    </div>

    <div class="about-line one">
      曾經以為，<br>
      這圈子很簡單。
    </div>

    <div class="about-line two">
      後來才明白，<br>
      深的從來不是圈子，<br>
      而是人性。
    </div>

    <div class="about-line three">
      感謝曾經的深深，<br>
      才有現在的蘇純。
    </div>

    <div class="about-line four">
      自己的世界，<br>
      照自己的方式生活。
    </div>

  </div>

</section>

</body>
</html>
